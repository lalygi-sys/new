<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>IB Prototypes</title>
  <style>
    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f7f8;
      color: #525252;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <p>Loading prototype…</p>
  <script>
    const BUILD = '0da9351';
    /* Bust GitHub Pages CDN on each deploy (BUILD in query string). */
    (function ensureFreshHub() {
      const params = new URLSearchParams(location.search);
      if (params.get('v') === BUILD) return;
      params.set('v', BUILD);
      location.replace(location.pathname + '?' + params.toString() + location.hash);
    })();

    const SCREENS = {
      contests: './prototype/index.html#contests',
      rebate: './prototype/rebate/index.html',
      dashboard: './prototype/ib-dashboard/index.html'
    };
    const DEFAULT_SCREEN = 'dashboard';

    function withBuild(url) {
      const hashIdx = url.indexOf('#');
      const path = hashIdx >= 0 ? url.slice(0, hashIdx) : url;
      const hash = hashIdx >= 0 ? url.slice(hashIdx) : '';
      const join = path.includes('?') ? '&' : '?';
      return path + join + 'v=' + BUILD + hash;
    }

    function screenFromHash() {
      const hash = (location.hash || '').replace(/^#/, '');
      return SCREENS[hash] ? hash : DEFAULT_SCREEN;
    }

    location.replace(withBuild(SCREENS[screenFromHash()]));
  </script>
</body>
</html>
