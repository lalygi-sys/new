            return;
          }
          onNavigate('board');
          showToast(
            account
              ? `You are participating on account ${account.type} #${account.number}!`
              : 'You joined the contest!',
            'positive'
          );
        }}
      />
    </div>
  );
};

const lbOrdinal = (p) => (p === 1 ? '1st' : p === 2 ? '2nd' : p === 3 ? '3rd' : `${p}th`);

const ClientLeaderboard = ({ onNavigate, contestTypeId = 'volume', onMarkContestSeen }) => {
  const isMobile = useIsMobile();
  const [mobileVisibleCount, setMobileVisibleCount] = useState(20);
  const youRowRef = useRef(null);
  const scrollContainerRef = useRef(null);
  const [flash, setFlash] = useState(false);
  const [youInView, setYouInView] = useState(false);
  const [youAbove, setYouAbove] = useState(false);
  const flashTimerRef = useRef(null);
  useEffect(() => () => { if (flashTimerRef.current) clearTimeout(flashTimerRef.current); }, []);
  useEffect(() => {
    const row = youRowRef.current;
    if (!row || typeof IntersectionObserver === 'undefined') return;
    const scroller = scrollContainerRef.current;
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach(e => {
          setYouInView(e.isIntersecting);
          if (e.boundingClientRect && e.rootBounds) {
            setYouAbove(e.boundingClientRect.bottom < e.rootBounds.top + 44);
          }
        });
      },
      {
        root: scroller || null,
        threshold: 0.01,
        rootMargin: scroller ? '-44px 0px -72px 0px' : '-120px 0px -72px 0px',
      }
    );
    io.observe(row);
    return () => io.disconnect();
  }, [contestTypeId, isMobile, mobileVisibleCount]);
  const isCompletedRoute = String(contestTypeId).startsWith('completed:');
  const contest = isCompletedRoute
    ? (CLIENT_COMPLETED_CONTESTS.find(c => c.name === String(contestTypeId).slice('completed:'.length)) || CLIENT_COMPLETED_CONTESTS[0])
    : (CLIENT_CONTESTS.find(c => c.typeId === contestTypeId) || CLIENT_CONTESTS[0]);
  /* Переход с «Результаты» в списке завершённых всегда с префиксом completed: — фиксируем экран как итоговый, даже при рассинхроне данных */
  const isCompleted = isCompletedRoute || contest.state === 'completed';
  const ctype = CONTEST_TYPES[contest.typeId] || CONTEST_TYPES.volume;
  const periodLabel = `${contest.period || contest.dates}, 23:59 UTC`;
  useEffect(() => {
    if (!onMarkContestSeen || !contest?.typeId) return;
    const meta = CLIENT_CONTESTS.find(c => c.typeId === contest.typeId);
    if (meta?.isNew) onMarkContestSeen(contest.typeId);
  }, [contest.typeId, onMarkContestSeen]);
  const stripPrize = (s) => String(s || '').replace(/\s*bonus$/i, '');
  const prizesTop = (contest.prizes || []).slice(0, 3).map(p => stripPrize(p.prize));
  const total = Math.max(contest.participants || 0, isCompleted ? (contest.yourPlace || 0) : 12);
  const yourPlace = isCompleted ? (contest.yourPlace || 0) : 12;
  const initialsAt = (i) => {
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    return `${letters[i % 26]}${letters[(i * 7 + 3) % 26]}****`;
  };
  const valueAt = (p) => {
    const base = 260;
    const v = base * Math.pow(0.94, p - 1);
    return v.toFixed(1);
  };
  const rows = Array.from({length: total}).map((_, i) => {
    const p = i + 1;
    const isYou = p === yourPlace;
    return {
      p,
      isYou,
      n: isYou ? 'You' : initialsAt(i + 5),
      v: isYou && isCompleted ? '—' : valueAt(p),
      pr: p <= 3 ? (prizesTop[p - 1] || '—')
          : (isYou && isCompleted ? (contest.yourReward ? stripPrize(contest.yourReward) : '—') : '—'),
    };
  });
  const performScrollToYou = () => {
    const row = youRowRef.current;
    const scroller = scrollContainerRef.current;
    if (row && scroller) {
      const rowRect = row.getBoundingClientRect();
      const sRect = scroller.getBoundingClientRect();
      const offset = (rowRect.top - sRect.top) - (sRect.height / 2) + (rowRect.height / 2);
      scroller.scrollTo({ top: scroller.scrollTop + offset, behavior: 'smooth' });
    } else if (row) {
      const headerH = 96;
      const stickyH = 52;
      const rect = row.getBoundingClientRect();
      const target = window.scrollY + rect.top - headerH - stickyH - 8;
      window.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });
    }
    if (flashTimerRef.current) clearTimeout(flashTimerRef.current);
    setFlash(false);
    requestAnimationFrame(() => {
      setFlash(true);
      flashTimerRef.current = setTimeout(() => setFlash(false), 3400);
    });
  };
  const scrollToYou = () => {
    if (isMobile && yourPlace > mobileVisibleCount) {
      setMobileVisibleCount(yourPlace);
      requestAnimationFrame(() => requestAnimationFrame(performScrollToYou));
      return;
    }
    performScrollToYou();
  };
  return (
  <div className="screen-enter">
    <Breadcrumb items={[{label:'Contests', onClick:() => onNavigate('list')}, {label: isCompleted ? 'Results' : 'Leaderboard'}]} />
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'var(--ds-dim-5xl)',gap:'var(--ds-dim-3xl)',flexWrap:'wrap'}}>
      <div style={{display:'flex',alignItems:'center',gap:'var(--ds-dim-2xl)'}}>
        <h1 className="rig-title-02">{contest.name}</h1>
        <ContestTypeInfo typeId={contest.typeId} />
      </div>
      {isCompleted ? (
        <span style={{display:'flex',alignItems:'center',gap:'var(--ds-dim-2xl)',flexWrap:'wrap'}}>
          <Tag label="Completed" variant="neutral" />
          <ContestPeriodMeta>{periodLabel}</ContestPeriodMeta>
        </span>
      ) : (
        <span style={{display:'flex',alignItems:'center',gap:'var(--ds-dim-2xl)',flexWrap:'wrap'}}>
          <Tag label="Active" variant="positive" />
          <ContestPeriodMeta>{periodLabel}</ContestPeriodMeta>
        </span>
      )}
    </div>

    {isCompleted ? (
      <div className={`user-progress user-progress--completed${contest.yourReward ? ' user-progress--won' : ''}`}>
        <div className="user-progress__completed-body">
          <div className="user-progress__completed-main">
            <div className="user-progress__rank-block">
              <span className="user-progress__place">#{contest.yourPlace}</span>
              <span className="user-progress__place-meta">of {contest.participants} participants</span>
            </div>
            <div className="user-progress__result-panel">
              <span className="user-progress__result-label">Final result</span>
              <div className="user-progress__result-main">
                <strong className="user-progress__result-value">{valueAt(contest.yourPlace)}</strong>
                <span className="user-progress__result-metric">{ctype.metric}</span>
              </div>
            </div>
          </div>
          <div className="user-progress__outcome">
            <div className="user-progress__outcome-head">
              {contest.yourReward && <Icon name="gift" size="sm" />}
              <span className="user-progress__score-value">
                {contest.yourReward ? stripPrize(contest.yourReward) : 'No prize'}
              </span>
            </div>
            <span className="user-progress__score-meta">
              {contest.yourReward
                ? 'Reward credited to trading account'
                : 'No prize this time — keep trading to improve next time.'}
            </span>
          </div>
        </div>
      </div>
    ) : (
      <div className="user-progress user-progress--active">
        <div className="user-progress__row">
          <div className="user-progress__rank">
            <span className="user-progress__place">#12</span>
            <span className="user-progress__place-meta">of {contest.participants || '—'} participants · Top 25%</span>
          </div>
          <div className="user-progress__score">
            <span className="user-progress__score-line">
              <strong>67.4</strong> lots · To 3rd place: 88.8 more lots
            </span>
          </div>
        </div>
        <div className="user-progress__bar">
          <ProgressBar value={43} size="m" onBrand />
        </div>
        <div className="user-progress__caption">
          <span><strong>43%</strong> to prize zone</span>
          <span style={{display:'inline-flex',alignItems:'center',gap:'var(--ds-dim-2xl)'}}>
            <Icon name="clock" size="sm" /> {contest.days || '—'} 4 h left
          </span>
        </div>
      </div>
    )}

    <div className="table-header leaderboard-table-header">
      <h4 className="rig-title-04">
        {isCompleted ? 'Final results' : 'Leaderboard'}
        <span className="rig-utility-01 leaderboard-table-header__count">{total} participants</span>
      </h4>
      <span className="table-header__meta">{isCompleted ? `Finalized ${(contest.dates.split(' — ')[1] || contest.dates)}, 23:59 UTC` : 'Updated: 2 min ago'}</span>
    </div>
    {isMobile ? (
      <div>
        {(() => {
          const you = rows.find(r => r.isYou);
          if (!you || youInView) return null;
          return (
            <div className="lb-sticky-you">
              <Button
                variant="outline"
                size="s"
                block
                icon="star-solid"
                iconRight="chevron-down"
                eyebrow={`You — ${lbOrdinal(you.p)} place`}
                onClick={scrollToYou}
              >
                Jump to your row
              </Button>
            </div>
          );
        })()}
        <div className="lb-card-list">
          {rows.slice(0, mobileVisibleCount).map(r => {
            const topClass = r.p === 1 ? 'lb-card--top1' : r.p === 2 ? 'lb-card--top2' : r.p === 3 ? 'lb-card--top3' : '';
            return (
              <div
                key={r.p}
                ref={r.isYou ? youRowRef : null}
                className={`lb-card ${topClass} ${r.isYou ? 'lb-card--you' : ''} ${r.isYou && flash ? 'lb-card--flash' : ''}`}
              >
                {r.isYou
                  ? <span className="medal" style={{background:'var(--ds-primary-content)',color:'var(--ds-primary)'}}>{r.p}</span>
                  : <Medal position={r.p}/>}
                <div style={{minWidth:0}}>
                  <div className="lb-card__name">
                    {r.isYou
                      ? (<><Icon name="star-solid" size="xs" style={{color:'var(--ds-primary)',marginRight:4}} /> You</>)
                      : (r.p <= 3 ? <strong>{r.n}</strong> : r.n)}
                  </div>
                  <div className="lb-card__sub">{r.v} {ctype.metric.toLowerCase()}</div>
                </div>
                <div className={`lb-card__prize ${r.pr === '—' ? 'lb-card__prize--empty' : ''}`}>{r.pr}</div>
              </div>
            );
          })}
        </div>
        {mobileVisibleCount < rows.length && (
          <div style={{marginTop:'var(--ds-dim-3xl)'}}>
            <Button variant="text" size="l" block onClick={() => setMobileVisibleCount(c => c + 20)}>
              Load more
            </Button>
          </div>
        )}
      </div>
    ) : (
    <div className="table-wrap table-wrap--leaderboard">
      <div className="leaderboard-scroll" ref={scrollContainerRef}>
        <table>
          <thead><tr>
            <th className="lb-col-place">Place</th>
            <th className="lb-col-name">Participant</th>
            <th className="lb-col-score">{ctype.metric}</th>
            <th className="lb-col-prize">Prize</th>
          </tr></thead>
          <tbody>
            {(() => {
              const you = rows.find(r => r.isYou);
              if (!you) return null;
              const showTopPin = !youInView && youAbove;
              return (
                <tr
                  className={`leaderboard-pin leaderboard-pin--top ${showTopPin ? '' : 'leaderboard-pin--hidden'}`}
                  style={{cursor:'pointer'}}
                  onClick={scrollToYou}
                >
                  <td className="lb-col-place">
                    <span className="medal" style={{background:'var(--ds-primary-content)',color:'var(--ds-primary)'}}>{you.p}</span>
                  </td>
                  <td className="lb-col-name">
                    <Icon name="star-solid" size="xs" style={{color:'var(--ds-primary)',marginRight:2}} /> You
                    <span
                      role="button"
                      tabIndex={0}
                      onClick={(e) => { e.stopPropagation(); scrollToYou(); }}
                      onKeyDown={(e) => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); e.stopPropagation(); scrollToYou(); } }}
                      className="leaderboard-pin__link"
                    >Show in ranking</span>
                  </td>
                  <td className="lb-col-score">{you.v}</td>
                  <td className="lb-col-prize">{you.pr}</td>
                </tr>
              );
            })()}
            {rows.map(r => {
              const cls = `${r.isYou ? 'highlight' : ''} ${r.isYou && flash ? 'leaderboard-flash' : ''}`.trim();
              return (
                <tr key={r.p} ref={r.isYou ? youRowRef : null} className={cls}>
                  <td className="lb-col-place">
                    {r.isYou
                      ? <span className="medal" style={{background:'var(--ds-primary-content)',color:'var(--ds-primary)'}}>{r.p}</span>
                      : <Medal position={r.p}/>}
                  </td>
                  <td className="lb-col-name">
                    {r.isYou
                      ? (<><Icon name="star-solid" size="xs" style={{color:'var(--ds-primary)',marginRight:2}} /> You</>)
                      : (r.p <= 3 ? <strong>{r.n}</strong> : r.n)}
                  </td>
                  <td className="lb-col-score">{r.v}</td>
                  <td className="lb-col-prize" style={{color: r.pr === '—' ? 'var(--ds-text-muted)' : undefined}}>{r.pr}</td>
                </tr>
              );
            })}
            {(() => {
              const you = rows.find(r => r.isYou);
              if (!you) return null;
              const showBottomPin = !youInView && !youAbove;
              return (
                <tr
                  className={`leaderboard-pin leaderboard-pin--bottom ${showBottomPin ? '' : 'leaderboard-pin--hidden'}`}
                  style={{cursor:'pointer'}}
                  onClick={scrollToYou}
                >
                  <td className="lb-col-place">
                    <span className="medal" style={{background:'var(--ds-primary-content)',color:'var(--ds-primary)'}}>{you.p}</span>
                  </td>
                  <td className="lb-col-name">
                    <Icon name="star-solid" size="xs" style={{color:'var(--ds-primary)',marginRight:2}} /> You
                    <span
                      role="button"
                      tabIndex={0}
                      onClick={(e) => { e.stopPropagation(); scrollToYou(); }}
                      onKeyDown={(e) => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); e.stopPropagation(); scrollToYou(); } }}
                      className="leaderboard-pin__link"
                    >Show in ranking</span>
                  </td>
                  <td className="lb-col-score">{you.v}</td>
                  <td className="lb-col-prize">{you.pr}</td>
                </tr>
              );
            })()}
          </tbody>
        </table>
      </div>
    </div>
    )}
  </div>
  );
};

  const markContestJoined = (typeId, mode = 'active') =>
    setJoinedContests(prev => ({ ...prev, [typeId]: mode }));
  const cancelContest = (typeId) =>
    setJoinedContests(prev => { const next = { ...prev }; delete next[typeId]; return next; });
  const [adminScreen, setAdminScreen] = useState('dashboard');
  /* Mobile chrome: drawer (header menu) */
  const [mobileDrawerOpen, setMobileDrawerOpen] = useState(false);

  /* Прототип: «просмотренные» не сохраняем — после F5 снова видны New и точка */
  const [seenContestTypes, setSeenContestTypes] = useState(() => new Set());
  const markContestTypeSeen = useCallback((typeId) => {
    if (!typeId) return;
    setSeenContestTypes(prev => {
      if (prev.has(typeId)) return prev;
      const n = new Set(prev);
      n.add(typeId);
      return n;
    });
  }, []);
  const clientNewContestsCount = useMemo(
    () => (role === 'client'
      ? CLIENT_CONTESTS.filter(c => c.isNew && !seenContestTypes.has(c.typeId)).length
      : 0),
    [role, seenContestTypes]
  );

  const addIbContest = (row) => setIbRows(prev => {
    const base = row.name;
    const existing = new Set(prev.map(r => r.name));
    let name = base, i = 2;
    while (existing.has(name)) { name = `${base} (${i++})`; }
    return [{ ...row, name }, ...prev];
  });

  const handleRoleChange = r => {
    setRole(r);
    if (r === 'ib') setIbScreen('list');
    if (r === 'client') setClientScreen('list');
    if (r === 'admin') setAdminScreen('dashboard');
    if (r === 'client') history.replaceState(null, '', '#client');
    else if (window.location.hash === '#client') history.replaceState(null, '', window.location.pathname + window.location.search);
    window.scrollTo(0, 0);
  };

  const navIB = s => { setIbScreen(s); window.scrollTo(0, 0); };
  const navClient = s => { setClientScreen(s); window.scrollTo(0, 0); };
  const navAdmin = s => { setAdminScreen(s); window.scrollTo(0, 0); };

  /* Resolve which menu items the slide-down drawer should show based on
     current role + internal screen state. Drawer reuses production persona
     menus — items without a real screen show a friendly toast. */
  const handleNavMenuSelect = (item) => {
    if (role === 'ib' && item.key === 'dashboard') {
      window.location.assign(IB_DASHBOARD_PROTOTYPE_HREF);
      return;
    }
    if (role === 'ib' && item.key === 'contests') {
      navIB('list');
      return;
    }
    if (role === 'ib' && item.key === 'rebate') {
      window.location.assign(REBATE_PROTOTYPE_HREF);
      return;
    }
    if (role === 'ib' && item.key === 'revenue') {
      showAppToast('“Revenue statistics” — section not implemented in this prototype');
      return;
    }
    if (role === 'ib' && item.key === 'promo') {
      showAppToast('“Promo materials” — section not implemented in this prototype');
      return;
    }
    if (role === 'client' && item.key === 'contests') {
      navClient('list');
      return;
    }
    if (role === 'admin' && item.key === 'contests') {
      navAdmin('dashboard');
      return;
    }
    if (role === 'admin' && item.key === 'dashboard') {
      navAdmin('dashboard');
      return;
    }
    showAppToast(`“${item.label}” — section not implemented in this prototype`);
  };
  const handleDrawerSelect = (item) => {
    setMobileDrawerOpen(false);
    handleNavMenuSelect(item);
  };
  /* In-app toast helper that bubbles up through the ToastProvider via
     a small inner component (required because useToast needs a Provider
     above it). */
  const [pendingToast, setPendingToast] = useState(null);
  const showAppToast = (msg) => setPendingToast({ msg, ts: Date.now() });
  const handleProfileAction = (action) => {
    const labels = {
      invite: 'Invite',
      'profile-settings': 'Profile settings',
      notifications: 'Notifications',
      language: 'Language',
      logout: 'Log out',
    };
    showAppToast(`${labels[action] || action} — not implemented in this prototype`);
  };

  return (
    <ToastProvider>
      <AppShellToastBridge pending={pendingToast} />
      <RolePreviewBar
        role={role}
        onRoleChange={handleRoleChange}
      />
      <AppHeader
        role={role}
        activeKey={
          role === 'admin' && adminScreen === 'dashboard' ? 'dashboard' : 'contests'
        }
        clientNewContestsCount={clientNewContestsCount}
        clientContestsTotal={CLIENT_CONTESTS.length}
        onMenuOpen={() => setMobileDrawerOpen(true)}
        onMenuSelect={handleNavMenuSelect}
        onProfileAction={handleProfileAction}
      />
      <MobileDrawer
        open={mobileDrawerOpen}
        onClose={() => setMobileDrawerOpen(false)}
        items={HEADER_MENUS[role] || HEADER_MENUS.ib}
        activeKey={role === 'admin' && adminScreen === 'dashboard' ? 'dashboard' : 'contests'}
        onSelect={handleDrawerSelect}
        role={role}
        clientNewContestsCount={clientNewContestsCount}
        clientContestsTotal={CLIENT_CONTESTS.length}
      />
      <div className="app">
        {role === 'ib' && (
          <Container className={ibScreen === 'wizard' ? 'ds-container--split' : ''}>
            {ibScreen === 'list' && <IBMyContests onNavigate={navIB} rows={ibRows} setRows={setIbRows} onSelectContest={setSelectedIbContestName} />}
            {ibScreen === 'wizard' && <IBCreateContest onNavigate={navIB} onCreateContest={addIbContest} />}
            {ibScreen === 'detail' && <IBContestDetail onNavigate={navIB} contest={ibRows.find(r => r.name === selectedIbContestName)} />}
          </Container>
        )}
        {role === 'client' && (
          <Container>
            {clientScreen === 'list' && <ClientContestList onNavigate={navClient} onSelectContest={setClientContestTypeId} joinedContests={joinedContests} onCancelContest={cancelContest} onJoinContest={markContestJoined} seenContestTypes={seenContestTypes} onMarkContestSeen={markContestTypeSeen} />}
            {clientScreen === 'terms' && <ClientContestTerms onNavigate={navClient} contestTypeId={clientContestTypeId} joinedContests={joinedContests} onJoinContest={markContestJoined} onCancelContest={cancelContest} onMarkContestSeen={markContestTypeSeen} />}
            {clientScreen === 'board' && <ClientLeaderboard onNavigate={navClient} contestTypeId={clientContestTypeId} onMarkContestSeen={markContestTypeSeen} />}
          </Container>
        )}
        {role === 'admin' && (
          <Container>
            {adminScreen === 'dashboard' && <AdminDashboard onNavigate={navAdmin} />}
            {adminScreen === 'detail' && <AdminContestDetail onNavigate={navAdmin} />}
          </Container>
        )}
      </div>
    </ToastProvider>
  );
};

/* Bridge that lets <App /> trigger a toast from outside ToastProvider. */
const AppShellToastBridge = ({ pending }) => {
  const showToast = useToast();
  useEffect(() => {
    if (pending && pending.msg) showToast(pending.msg, 'positive');
  }, [pending && pending.ts]);
  return null;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
