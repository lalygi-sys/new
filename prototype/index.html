/* DS Input — label floats inside the field per RIG Storybook.
   Supports leftIcon, rightIcon, prefix, textarea, and a "button" mode used by
   wrappers like CalendarInput and Select that handle value rendering themselves.
*/
const Input = ({
  label, description, error, type = 'text',
  leftIcon, rightIcon, prefix,
  value, onChange, placeholder, disabled,
  onClick, asButton, children,
  size = 'M',
  style, className = '',
  ...rest
}) => {
  const [focused, setFocused] = useState(false);
  const hasValue = asButton ? !!children : value !== undefined && value !== null && value !== '';
  const shellCls = [
    'ds-input-shell',
    size === 'S' ? 'ds-input-shell--s' : '',
    focused ? 'ds-input-shell--focus' : '',
    error ? 'ds-input-shell--error' : '',
    disabled ? 'ds-input-shell--disabled' : '',
    asButton ? 'ds-input-shell--button' : '',
    hasValue ? 'ds-input-shell--filled' : '',
    type === 'textarea' ? 'ds-input-shell--textarea' : '',
  ].filter(Boolean).join(' ');

  const renderIcon = (name, side) => name && (
    <span className={`ds-input-shell__icon ds-input-shell__icon--${side}`}>
      <svg><use href={dsIc(name)} /></svg>
    </span>
  );

  return (
    <div className={`ds-input-wrap ${className}`} style={style}>
      {label && <label className="ds-input-label">{label}</label>}
      <div className={shellCls} onClick={asButton ? onClick : undefined}
           onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}>
        {renderIcon(leftIcon, 'left')}
        {prefix && <span className="ds-input-shell__prefix">{prefix}</span>}
        {asButton ? (
          <span className="ds-input-field" style={{display:'flex', alignItems:'center'}}>{children}</span>
        ) : type === 'textarea' ? (
          <textarea className="ds-input-field"
            value={value} onChange={onChange} placeholder={placeholder} disabled={disabled}
            onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
            {...rest} />
        ) : (
          <input type={type} className="ds-input-field"
            value={value ?? ''} onChange={onChange} placeholder={placeholder} disabled={disabled}
            onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
            {...rest} />
        )}
        {renderIcon(rightIcon, 'right')}
      </div>
      {error && <div className="ds-input-error">{error}</div>}
      {description && !error && <div className="ds-input-desc">{description}</div>}
    </div>
  );
};

/* DS Dropdown (Select) — DS Input trigger + options popover */
const Select = ({ label, value, onChange, options = [], placeholder, description, error, leftIcon }) => {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);
  const selected = options.find(o => o.value === value);
  return (
    <div ref={ref} style={{position:'relative'}}>
      <Input
        asButton label={label} leftIcon={leftIcon} rightIcon="chevron-down"
        description={description} error={error}
        onClick={() => setOpen(v => !v)}
      >
        {selected ? selected.label : (placeholder || '')}
      </Input>
      {open && (
        <div className="ds-dropdown">
          {options.map(opt => (
            <div key={opt.value}
                 className={`ds-dropdown__option ${opt.value === value ? 'ds-dropdown__option--selected' : ''}`}
                 onClick={() => { onChange && onChange(opt.value); setOpen(false); }}>
              <span className="ds-dropdown__option-label">{opt.label}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

/* ButtonGroup — DS segmented control.
   Use for binary or few-option mutually exclusive selection where
   all options must be visible at once (e.g. AM/PM, view mode toggles).
   Props:
     value       — currently selected option.value
     onChange    — fn(nextValue)
     options     — [{ value, label, disabled? }]
     size        — 's' | 'm' (default 'm')
     ariaLabel   — label for the radiogroup
*/
const ButtonGroup = ({ value, onChange, options, size = 'm', ariaLabel }) => (
  <div className={`ds-button-group ds-button-group--${size}`} role="radiogroup" aria-label={ariaLabel}>
    {options.map(opt => {
      const active = opt.value === value;
      return (
        <button
          key={opt.value}
          type="button"
          role="radio"
          aria-checked={active}
          disabled={opt.disabled}
          className={`ds-button-group__segment ${active ? 'ds-button-group__segment--active' : ''}`}
          onClick={() => !opt.disabled && onChange(opt.value)}
        >
          {opt.label}
        </button>
      );
    })}
  </div>
);

const Notification = ({ variant = 'negative', title, description, actions, icon }) => (
  <div className={`ds-notification ds-notification--${variant}`}>
    {icon && <span className="ds-notification__icon" style={{color: variant === 'negative' ? 'var(--ds-negative)' : variant === 'warning' ? 'var(--ds-warning)' : 'var(--ds-primary)'}}>
      <svg width="20" height="20"><use href={dsIc(icon)} /></svg>

    <div className="ds-notification__content">

    </div>
  </div>
);

const Container = ({ children, style, className = '' }) => (
  <div className={`ds-container ${className}`} style={style}>{children}</div>
);

const Modal = ({ open, onClose, title, subtitle, children, footer, size = 'm' }) => {
  useEffect(() => {
    if (!open) return;
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    const onKey = (e) => { if (e.key === 'Escape') onClose && onClose(); };
    document.addEventListener('keydown', onKey);
    return () => { document.body.style.overflow = prev; document.removeEventListener('keydown', onKey); };
  }, [open, onClose]);
  if (!open) return null;
  const maxWidth = size === 'l' ? 640 : size === 's' ? 420 : 520;
  const modal = (
    <div className="ds-modal-overlay" onClick={onClose}>
      <div className="ds-modal" style={{maxWidth}} onClick={e => e.stopPropagation()}>
        <div className="ds-modal__header">
          <div className="ds-modal__title">
            {title && <div className="rig-title-03">{title}</div>}
            {subtitle && <div style={{marginTop:'var(--ds-dim-s)', color:'var(--ds-text-muted)', fontSize:14, lineHeight:'20px'}}>{subtitle}</div>}
          </div>
          <button className="ds-modal__close" onClick={onClose} aria-label="Закрыть" type="button">
            <svg><use href="#ic-cross-24"/></svg>
          </button>
        </div>
        <div className="ds-modal__body">{children}</div>
        {footer && <div className="ds-modal__footer">{footer}</div>}
      </div>
    </div>
  );
  return ReactDOM.createPortal(modal, document.body);
};

const ToastContext = createContext();

const ToastProvider = ({ children }) => {
  const [toast, setToast] = useState(null);
  const timerRef = useRef();

  const showToast = useCallback((msg, type = 'negative', action) => {
    clearTimeout(timerRef.current);
    setToast({ msg, type, action });
    timerRef.current = setTimeout(() => setToast(null), action ? 6000 : 4000);
  }, []);

  const handleAction = () => {
    clearTimeout(timerRef.current);
    if (toast?.action?.onClick) toast.action.onClick();
    setToast(null);
  };

  const iconSvg = toast?.type === 'positive'
    ? <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style={{flexShrink:0}}><path d="M10.7396 15.77L17.0416 9.46788L16.4752 8.90148C16.1173 8.5435 15.5369 8.5435 15.1789 8.90148L10.7396 13.3408L8.82108 11.4223C8.4631 11.0643 7.8827 11.0643 7.52472 11.4223L6.95831 11.9887L10.7396 15.77Z" fill="#31865B"/><path fillRule="evenodd" clipRule="evenodd" d="M21.1666 12C21.1666 17.0626 17.0626 21.1666 12 21.1666C6.93737 21.1666 2.83331 17.0626 2.83331 12C2.83331 6.93737 6.93737 2.83331 12 2.83331C17.0626 2.83331 21.1666 6.93737 21.1666 12ZM19.3333 12C19.3333 16.0501 16.0501 19.3333 12 19.3333C7.94989 19.3333 4.66665 16.0501 4.66665 12C4.66665 7.94989 7.94989 4.66665 12 4.66665C16.0501 4.66665 19.3333 7.94989 19.3333 12Z" fill="#31865B"/></svg>
    : <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style={{flexShrink:0}}><circle cx="12" cy="12" r="9.17" stroke="#e72d2d" strokeWidth="1.83"/><path d="M12 8v4M12 16h.01" stroke="#e72d2d" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;

  return (
    <ToastContext.Provider value={showToast}>
      {children}
      <div className={`toast toast--${toast?.type || 'negative'} ${toast ? 'toast--visible' : ''}`}>
        {toast && iconSvg}
        <span className="toast__msg">{toast?.msg}</span>
        {toast?.action && (
          <button type="button" className="toast__action" onClick={handleAction}>
            {toast.action.label}
          </button>
        )}
      </div>
    </ToastContext.Provider>
  );
};

const AppHeader = ({ role, activeKey: activeKeyProp, clientNewContestsCount = 0, clientContestsTotal = 0 }) => {
  const menu = HEADER_MENUS[role] || HEADER_MENUS.ib;
  const [internalKey, setInternalKey] = useState(activeKeyProp || menu[0].key);
  const activeKey = activeKeyProp || internalKey;
  const setActiveKey = setInternalKey;

  useEffect(() => { if (!activeKeyProp) setInternalKey(menu[0].key); }, [role, activeKeyProp]);

  // For dropdown items: active if any child key matches activeKey
  const isItemActive = (item) => {
    if (item.key === activeKey) return true;
    if (item.dropdown && item.dropdown.some(d => d.key === activeKey)) return true;
    return false;
  };

  return (
    <header className="app-header" role="banner">
      <div className="app-header__logo" aria-label="Логотип" />
      <nav className="app-header__menu" aria-label="Главное меню">
        {menu.map(item => {
          if (item.dropdown) {
            return (
              <div key={item.key} className="app-header__menu-group">
                <button
                  className={`app-header__menu-item app-header__menu-item--has-dropdown ${isItemActive(item) ? 'app-header__menu-item--active' : ''}`}
                  type="button"
                  aria-haspopup="menu"
                >
                  {item.label}
                  <svg className="app-header__menu-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                    <polyline points="6 9 12 15 18 9" />
                  </svg>
                </button>
                <div className="app-header__dropdown" role="menu">
                  {item.dropdown.map(d => (
                    <button
                      key={d.key}
                      type="button"
                      role="menuitem"
                      className={`app-header__dropdown-item ${activeKey === d.key ? 'app-header__dropdown-item--active' : ''}`}
                      onClick={() => setActiveKey(d.key)}
                    >
                      {d.key === 'contests' && role === 'client' ? (
                        <>
                          <span className="app-header__dropdown-item__label">
                            <span>{d.label}</span>
                            {clientNewContestsCount > 0 && (
                              <span className="app-header__dropdown-notify-dot" aria-hidden="true" title="Есть новые контесты" />

                          </span>
                          <Tag label={String(clientContestsTotal)} variant="brand" />
                        </>
                      ) : (
                        <>
                          <span>{d.label}</span>
                          {d.badge ? <Tag label={d.badge} variant="brand" /> : null}
                        </>
                      )}
                    </button>
                  ))}
                </div>
              </div>
            );

          return (
            <button
              key={item.key}
              className={`app-header__menu-item ${activeKey === item.key ? 'app-header__menu-item--active' : ''}`}
              onClick={() => setActiveKey(item.key)}
            >

            <circle cx="12" cy="7" r="4"/>

              <line x1="4" y1="12" x2="20" y2="12" />
              <line x1="4" y1="17" x2="20" y2="17" />

    </header>
  );
};

/* ── Wizard Stepper ── */
const WizardStepper = ({ currentStep, totalSteps }) => {
  const checkSvg = <svg viewBox="0 0 24 24" fill="none" style={{width:24,height:24}}><path d="M10.7396 15.7695L17.0416 9.46739L16.4752 8.90099C16.1173 8.54301 15.5369 8.54301 15.1789 8.90099L10.7396 13.3403L8.82108 11.4218C8.4631 11.0638 7.8827 11.0638 7.52472 11.4218L6.95831 11.9882L10.7396 15.7695Z" fill="#31865B"/><path fillRule="evenodd" clipRule="evenodd" d="M21.1666 11.9997C21.1666 17.0623 17.0626 21.1663 12 21.1663C6.93737 21.1663 2.83331 17.0623 2.83331 11.9997C2.83331 6.93706 6.93737 2.83301 12 2.83301C17.0626 2.83301 21.1666 6.93706 21.1666 11.9997ZM19.3333 11.9997C19.3333 16.0498 16.0501 19.333 12 19.333C7.94989 19.333 4.66665 16.0501 4.66665 11.9997C4.66665 7.94959 7.94989 4.66634 12 4.66634C16.0501 4.66634 19.3333 7.94959 19.3333 11.9997Z" fill="#31865B"/></svg>;

  const items = [];
  for (let i = 1; i <= totalSteps; i++) {
    const isDone = i < currentStep;
    const isActive = i === currentStep;
    items.push(
      <div key={`d${i}`} className={`wizard-dot ${isActive ? 'wizard-dot--active' : ''} ${isDone ? 'wizard-dot--done' : ''}`}>
        {isDone ? checkSvg : <svg><use href={`#ic-digit-${i}-24`} /></svg>}
      </div>
    );
    if (i < totalSteps) {
      items.push(<div key={`c${i}`} className={`wizard-connector ${i < currentStep ? 'wizard-connector--done' : ''}`} />);
    }
  }
  return <div className="wizard-steps">{items}</div>;
};

/* ── Calendar ── */
const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MONTHS_SHORT = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
const DOW = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

const formatDate = d => `${d.getDate()} ${MONTHS_SHORT[d.getMonth()]} ${d.getFullYear()}`;

const MeridiemToggle = ({ value, onChange }) => (
  <div className="time-meridiem">
    <ButtonGroup
      value={value}
      onChange={onChange}
      options={[{value:'AM', label:'AM'}, {value:'PM', label:'PM'}]}
      size="s"
      ariaLabel="AM или PM"
    />
  </div>
);

const CalendarInput = ({ value, onChange, label }) => {
  const [open, setOpen] = useState(false);
  const [viewYear, setViewYear] = useState(value.getFullYear());
  const [viewMonth, setViewMonth] = useState(value.getMonth());
  const ref = useRef();

  useEffect(() => {
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const firstDay = new Date(viewYear, viewMonth, 1);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  const nav = dir => {
    let m = viewMonth + dir, y = viewYear;
    if (m > 11) { m = 0; y++; } else if (m < 0) { m = 11; y--; }
    setViewMonth(m); setViewYear(y);
  };

  const select = d => { onChange(new Date(viewYear, viewMonth, d)); setOpen(false); };

  return (
    <div ref={ref} style={{position:'relative'}}>
      <Input asButton label={label} rightIcon="calendar" onClick={() => setOpen(v => !v)}>
        {formatDate(value)}
      </Input>
      {open && (
        <div className="cal-dropdown">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px 12px'}}>
            <button style={{width:28,height:28,border:'none',background:'none',borderRadius:8,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--ds-text-secondary)'}} onClick={() => nav(-1)}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span style={{fontSize:14,fontWeight:600}}>{MONTHS[viewMonth]} {viewYear}</span>
            <button style={{width:28,height:28,border:'none',background:'none',borderRadius:8,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--ds-text-secondary)'}} onClick={() => nav(1)}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
          <div className="cal-grid">
            {DOW.map(d => <div key={d} style={{fontSize:12,fontWeight:600,color:'var(--ds-text-tertiary)',textAlign:'center',padding:'0 0 8px'}}>{d}</div>)}
            {Array.from({length: startDow}).map((_,i) => <div key={`e${i}`} />)}
            {Array.from({length: daysInMonth}).map((_,i) => {
              const d = i + 1;
              const dt = new Date(viewYear, viewMonth, d);
              const isToday = dt.getTime() === today.getTime();
              const isSelected = value && dt.getTime() === value.getTime();
              return <button key={d} className={`cal-day ${isToday ? 'cal-day--today' : ''} ${isSelected ? 'cal-day--selected' : ''}`} onClick={() => select(d)}>{d}</button>;
            })}
          </div>
          <div style={{display:'flex',gap:12,padding:'12px 16px 16px'}}>
            <button style={{flex:1,height:40,border:'none',background:'none',borderRadius:12,fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}} onClick={() => setOpen(false)}>Закрыть</button>
          </div>
        </div>
      )}
    </div>
  );
};

        {dates && <span className="contest-card__meta-item"><svg><use href="#ic-calendar-24"/></svg>{dates}</span>}

            <span className="contest-card__prize-label">Призовой фонд</span>
            {prize}
          </span>
        )}
      </div>
      {prize && prizeVariant === 'row' && (
        <div className="contest-card__prize-row">
          <span className="contest-card__prize-row-label">Призовой фонд</span>
          <span className="contest-card__prize-row-value">{prize}</span>
        </div>
      )}
      {prize && prizeVariant === 'chip' && (
        <span className="contest-card__prize-chip">
          <svg aria-hidden="true"><use href="#ic-gift-24"/></svg>
          Призовой фонд <strong>{prize}</strong>
        </span>
      )}
      {prize && prizeVariant === 'stack' && (
        <div className="contest-card__prize-stack">
          <span className="contest-card__prize-stack-label">Призовой фонд</span>
          <span className="contest-card__prize-stack-value">{prize}</span>
        </div>
      )}
      {progress != null && (
        <div style={{display:'flex',flexDirection:'column',gap:'var(--ds-dim-m)'}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,lineHeight:'16px',color:'var(--ds-text-muted)'}}>
            <span>{progressText}</span>
            {progress > 0 && <span style={{fontWeight:500,color:'var(--ds-text-primary)'}}>{progress}%</span>}
          </div>
          <ProgressBar value={progress} size="xs" />
        </div>
      )}
      {footer && (
        <div className="contest-card__footer" onClick={e => e.stopPropagation()}>
          {footer}
        </div>
      )}
      {!footer && onAction && (
        <div className="contest-card__footer">
          <Button variant="primary" size="m" block onClick={e => { e.stopPropagation(); onAction(); }} disabled={actionDisabled}>{actionLabel}</Button>
        </div>
      )}
    </div>
  );
};

/* WizardFooter — sticky-bottom action row used across all wizard steps.
   Layout:
     [Назад] ........... [Сохранить черновик] [Далее / Запустить]
   "Сохранить черновик" is available on every step. The right-most button
   becomes the launch CTA on the final step. */
const WizardFooter = ({ step, isFinal = false, onPrev, onNext, onSaveDraft, onLaunch, nextDisabled }) => (
  <div style={{
    marginTop: 'var(--ds-dim-5xl)',
    display: 'flex', justifyContent: 'space-between',
    gap: 'var(--ds-dim-2xl)', flexWrap: 'wrap', alignItems: 'center',
  }}>

      {step > 1 && (
        <Button variant="outline" size="m" icon="arrow-left" onClick={onPrev}>Назад</Button>
      )}
    </div>

      <Button variant="outline" size="m" icon="save" onClick={onSaveDraft}>Сохранить черновик</Button>
      {isFinal ? (
        <Button variant="primary" size="m" icon="rocket" onClick={onLaunch}>Запустить контест</Button>
      ) : (
        <Button variant="primary" size="m" iconRight="arrow-right" onClick={onNext} disabled={nextDisabled}>Далее</Button>
      )}
    </div>
  </div>
);

const IBCreateContest = ({ onNavigate, onCreateContest }) => {
  const showToast = useToast();
  const [step, setStep] = useState(1);
  const [contestType, setContestType] = useState('volume');
  const [startDate, setStartDate] = useState(new Date(2026, 3, 15));
  const [endDate, setEndDate] = useState(new Date(2026, 4, 15));
  const [startTime, setStartTime] = useState('12:00');
  const [endTime, setEndTime] = useState('11:59');
  const [startMeridiem, setStartMeridiem] = useState('AM');
  const [endMeridiem, setEndMeridiem] = useState('PM');
  const [timezone, setTimezone] = useState('UTC+00');

  const FIXED_CONDITIONS = {
    minBalance: 100,
    minLot: 0.01,
    accountScope: 'single',
  };
  const [prizeType, setPrizeType] = useState('wallet');

  const [prizes, setPrizes] = useState([
    {id: 1, pos: 1, amount: '500'},
    {id: 2, pos: 2, amount: '300'},
    {id: 3, pos: 3, amount: '100'},
  ]);

  const addPrize = () => {
    setPrizes(prev => {
      const nextPos = prev.length + 1;
      const nextId = (prev[prev.length - 1]?.id || 0) + 1;
      return [...prev, {id: nextId, pos: nextPos, amount: '50'}];
    });
  };
  const removePrize = (id) => {
    setPrizes(prev => prev.filter(p => p.id !== id).map((p, i) => ({...p, pos: i + 1})));
  };
  const updatePrize = (id, amount) => {
    setPrizes(prev => prev.map(p => p.id === id ? {...p, amount} : p));
  };
  const prizeTotal = prizes.reduce((sum, p) => sum + (parseFloat(p.amount) || 0), 0);

  const activeType = CONTEST_TYPES[contestType];

  const next = () => step < 4 && setStep(step + 1);
  const prev = () => step > 1 && setStep(step - 1);

  const fmtShort = d => `${d.getDate()} ${MONTHS_SHORT[d.getMonth()]} ${d.getFullYear()}`;
  const periodString = `${fmtShort(startDate)} — ${fmtShort(endDate)}`;

  const MONTHS_EN_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const formatPeriodEn = (s, e) => {
    const sd=s.getDate(), ed=e.getDate(), sm=s.getMonth(), em=e.getMonth(), sy=s.getFullYear(), ey=e.getFullYear();
    if (sy===ey && sm===em) return `${sd} — ${ed} ${MONTHS_EN_SHORT[sm]} ${sy}`;
    if (sy===ey) return `${sd} ${MONTHS_EN_SHORT[sm]} — ${ed} ${MONTHS_EN_SHORT[em]} ${sy}`;
    return `${sd} ${MONTHS_EN_SHORT[sm]} ${sy} — ${ed} ${MONTHS_EN_SHORT[em]} ${ey}`;
  };

  const buildContest = (status) => {
    const isActive = status === 'Active';
    const generatedName = activeType.title;
    const subtitle = isActive
      ? `Идёт сейчас · до ${endDate.getDate()} ${MONTHS_SHORT[endDate.getMonth()]}`
      : 'Черновик · не запущен';
    return {
      name: generatedName,
      subtitle,
      typeId: contestType,
      status,
      statusTag: isActive ? 'positive' : 'neutral',
      count: isActive ? 0 : '—',
      period: isActive ? formatPeriodEn(startDate, endDate) : 'Не задан',
      progress: isActive ? 0 : null,
      action: isActive ? 'Статистика' : 'Редактировать',
      actionIcon: isActive ? 'chart' : 'edit',
      share: isActive,
      nav: isActive ? 'detail' : 'wizard',
    };
  };

  const saveDraft = () => {
    onCreateContest && onCreateContest(buildContest('Draft'));
    onNavigate('list');
    showToast('Черновик сохранён');
  };
  const launchContest = () => {
    onCreateContest && onCreateContest(buildContest('Active'));
    onNavigate('list');
    showToast('Контест запущен!', 'positive');
  };

  return (
    <div className="screen-enter">
      <div className="wizard-layout">
        <div className="wizard-panel">
          <Breadcrumb items={[{label: 'Контесты для клиентов', onClick: () => onNavigate('list')}, {label: 'Создание контеста'}]} />
          <WizardStepper currentStep={step} totalSteps={4} />

          {step === 1 && (
            <div>
              <h3 className="rig-title-03" style={{marginBottom:'var(--ds-dim-s)'}}>Тип контеста</h3>
              <p className="rig-body-02" style={{color:'var(--ds-text-muted)', marginBottom:'var(--ds-dim-4xl)'}}>Выберите формат соревнования</p>
              <div className="rig-radio-cards" role="radiogroup" aria-label="Тип контеста">
                {CONTEST_TYPE_LIST.map(t => {
                  const isSelected = contestType === t.id;
                  const onKeyDown = (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                      e.preventDefault();
                      setContestType(t.id);
                    } else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                      e.preventDefault();
                      const i = CONTEST_TYPE_LIST.findIndex(x => x.id === contestType);
                      setContestType(CONTEST_TYPE_LIST[(i + 1) % CONTEST_TYPE_LIST.length].id);
                    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                      e.preventDefault();
                      const i = CONTEST_TYPE_LIST.findIndex(x => x.id === contestType);
                      setContestType(CONTEST_TYPE_LIST[(i - 1 + CONTEST_TYPE_LIST.length) % CONTEST_TYPE_LIST.length].id);
                    }
                  };
                  return (
                    <div
                      key={t.id}
                      role="radio"
                      aria-checked={isSelected}
                      tabIndex={isSelected ? 0 : -1}
                      className={`rig-radio-card ${isSelected ? 'rig-radio-card--selected' : ''}`}
                      onClick={() => setContestType(t.id)}
                      onKeyDown={onKeyDown}
                    >
                      <div className={`icon-circle icon-circle--${t.circle}`} style={{flexShrink:0}}>
                        <svg width="20" height="20"><use href={dsIc(t.icon)}/></svg>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:'flex',alignItems:'center',gap:'var(--ds-dim-m)'}}>
                          <div className="rig-body-02-bold">{t.title}</div>
                          <ContestTypeInfo typeId={t.id} />
                        </div>
                        <div className="rig-utility-01" style={{color:'var(--ds-text-muted)',marginTop:'var(--ds-dim-xs)'}}>{t.desc}</div>
                      </div>
                      <span className="rig-radio-card__trail" aria-hidden="true">
                        {isSelected && <svg><use href="#ic-check-24"/></svg>}
                      </span>
                    </div>
                  );
                })}
              </div>
              <WizardFooter step={step} onPrev={prev} onNext={next} onSaveDraft={saveDraft} />
            </div>
          )}

          {step === 2 && (
            <div>
              <h3 className="rig-title-03" style={{marginBottom:'var(--ds-dim-s)'}}>Период проведения</h3>
              <p className="rig-body-02" style={{color:'var(--ds-text-muted)', marginBottom:'var(--ds-dim-4xl)'}}>Укажите даты, время и часовой пояс</p>
              <div style={{display:'grid',gridTemplateColumns:'1fr 260px',gap:'var(--ds-dim-3xl)',marginBottom:'var(--ds-dim-4xl)'}}>
                <CalendarInput label="Дата начала" value={startDate} onChange={setStartDate} />
                <div className="time-with-meridiem">
                  <Input label="Время начала" rightIcon="clock" value={startTime} onChange={e => setStartTime(e.target.value)} />
                  <MeridiemToggle value={startMeridiem} onChange={setStartMeridiem} />
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 260px',gap:'var(--ds-dim-3xl)',marginBottom:'var(--ds-dim-4xl)'}}>
                <CalendarInput label="Дата окончания" value={endDate} onChange={setEndDate} />
                <div className="time-with-meridiem">
                  <Input label="Время окончания" rightIcon="clock" value={endTime} onChange={e => setEndTime(e.target.value)} />
                  <MeridiemToggle value={endMeridiem} onChange={setEndMeridiem} />
                </div>
              </div>
              <Select label="Часовой пояс" value={timezone} onChange={setTimezone} options={TIMEZONES} />
              <div style={{marginTop:'var(--ds-dim-6xl)'}}>
                <InfoBox icon="lightbulb"><span><strong>Рекомендация:</strong> оптимальная длительность для {activeType.title} — {contestType === 'grow' ? '2–8 недель, чтобы прирост был значимым' : contestType === 'streak' ? '3–6 недель для демонстрации дисциплины' : '1–4 недели'}</span></InfoBox>
              </div>
              <WizardFooter step={step} onPrev={prev} onNext={next} onSaveDraft={saveDraft} />
            </div>
          )}

          {step === 3 && (
            <div>
              <h3 className="rig-title-03" style={{marginBottom:'var(--ds-dim-s)'}}>Призовой фонд</h3>
              <p className="rig-body-02" style={{color:'var(--ds-text-muted)', marginBottom:'var(--ds-dim-4xl)'}}>Определите призы для победителей</p>
              <div className="ds-input-wrap">
                <ChipsGroup>
                  <Chips
                    label="Денежный приз на Wallet"
                    selected={prizeType === 'wallet'}
                    onClick={() => setPrizeType('wallet')}
                  />
                  <Chips
                    label="Призы T&W"
                    selected={prizeType === 'tw'}
                    onClick={() => setPrizeType('tw')}
                  />
                </ChipsGroup>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:'var(--ds-dim-3xl)',marginTop:'var(--ds-dim-l)'}}>
                {prizes.map(p => (
                  <div key={p.id} className="prize-row" style={{display:'grid',gridTemplateColumns:'40px 1fr 180px 40px',gap:'var(--ds-dim-3xl)',alignItems:'center'}}>
                    <PrizeRank position={p.pos} />
                    <div className="rig-body-01-bold">{p.pos} место</div>
                    <Input prefix="$" value={p.amount} onChange={e => updatePrize(p.id, e.target.value)} placeholder="0" />
                    {prizes.length > 1 && (
                      <IconButton icon="close" size="s" className="ds-icon-btn--danger" onClick={() => removePrize(p.id)} title="Удалить место" />
                    )}
                  </div>
                ))}
              </div>
              <div
                className="prize-pool-toolbar"
                role="status"
                aria-live="polite"
                aria-label={`Призовой фонд ${prizeTotal} долларов США`}
              >
                <div className="prize-pool-toolbar__cell prize-pool-toolbar__cell--lead" aria-hidden="true" />
                <div className="prize-pool-toolbar__cell prize-pool-toolbar__cell--action">
                  <Button variant="text" size="s" icon="plus" onClick={addPrize}>Добавить место</Button>
                </div>
                <span className="prize-pool-toolbar__total rig-body-02" style={{color:'var(--ds-text-primary)'}}>
                  Призовой фонд:{' '}
                  <span className="rig-body-02-bold" style={{fontVariantNumeric:'tabular-nums'}}>${prizeTotal.toLocaleString('en-US')}</span>
                </span>
                <div className="prize-pool-toolbar__cell prize-pool-toolbar__cell--trail" aria-hidden="true" />
              </div>
              <WizardFooter step={step} onPrev={prev} onNext={next} onSaveDraft={saveDraft} />
            </div>
          )}

          {step === 4 && (
            <div>
              <h3 className="rig-title-03" style={{marginBottom:'var(--ds-dim-s)'}}>Проверьте и запустите</h3>
              <p className="rig-body-02" style={{color:'var(--ds-text-muted)', marginBottom:'var(--ds-dim-4xl)'}}>Убедитесь, что всё верно перед запуском</p>
              {(() => {
                const renderField = ({k,v,tip,span,editStep}) => {
                  const isEditable = !!editStep;
                  const inner = (
                    <>
                      <div className="review-field__head">

  const ctype = CONTEST_TYPES[contest?.typeId] || CONTEST_TYPES.volume;

  const statusLabel = contest?.status || 'Active';
  const statusTag = contest?.statusTag || 'positive';
  const participantCount = contest
    ? (typeof contest.count === 'number' ? contest.count : 0)
    : 47;
  // "Just created" / fresh state — contest exists but has no participants
  // (or no period yet, e.g. a draft was opened from the list).
  const isFresh = !!contest && (
    participantCount === 0 ||
    contest.count === '—' ||
    contest.status === 'Draft' ||
    contest.status === 'Pending'

  const totalParticipants = isFresh ? 0 : participantCount;

const MIN_BALANCE_USD = 100;

const contestRequiresFunding = (typeId) => typeId === 'grow';

const INITIAL_TRADING_ACCOUNTS = [
  { id: 'mt5-5123467', type: 'MT5', number: '5123467', label: 'Рабочий',  leverage: '1:500',  balance: 1540, currency: 'USD' },
  { id: 'mt5-5123482', type: 'MT5', number: '5123482', label: 'Swing',    leverage: '1:200',  balance: 45,   currency: 'USD' },
  { id: 'mt4-4298110', type: 'MT4', number: '4298110', label: 'Scalping', leverage: '1:1000', balance: 250,  currency: 'USD' },
];

const JoinContestModal = ({ open, onClose, onJoin, contestName, contestType = 'volume', preregister = false, startsAtLabel }) => {
  const requiresFunding = contestRequiresFunding(contestType);
  const [accounts, setAccounts] = useState(INITIAL_TRADING_ACCOUNTS);
  const [selectedId, setSelectedId] = useState(null);
  const [createSelected, setCreateSelected] = useState(false);

  useEffect(() => {
    if (open) {
      setAccounts(INITIAL_TRADING_ACCOUNTS);
      setSelectedId(null);
      setCreateSelected(false);
    }
  }, [open]);

  const selected = accounts.find(a => a.id === selectedId) || null;
  const deficit = selected ? Math.max(0, MIN_BALANCE_USD - selected.balance) : 0;
  const needsDeposit = !preregister && requiresFunding && !!selected && selected.balance < MIN_BALANCE_USD;
  const canJoin = requiresFunding ? (!!selected || createSelected) : true;

  const pickAccount = (id) => { setSelectedId(id); setCreateSelected(false); };
  const pickCreate = () => { setCreateSelected(true); setSelectedId(null); };

  const handleParticipate = () => {
    if (createSelected) {
      const num = String(5300000 + Math.floor(Math.random() * 999999));
      const startingBalance = (requiresFunding && !preregister) ? MIN_BALANCE_USD : 0;
      const newAcc = { id: `new-${num}`, type: 'MT5', number: num, label: 'Новый', leverage: '1:500', balance: startingBalance, currency: 'USD' };
      setAccounts([newAcc, ...accounts]);
      setSelectedId(newAcc.id);
      onJoin(newAcc);
      return;
    }
    if (preregister) { onJoin(selected); return; }
    if (!requiresFunding) { onJoin(selected); return; }
    if (!selected) return;
    if (selected.balance < MIN_BALANCE_USD) {
      const topped = { ...selected, balance: MIN_BALANCE_USD };
      setAccounts(accounts.map(a => a.id === selected.id ? topped : a));
      onJoin(topped);
      return;
    }
    onJoin(selected);
  };

  const participateLabel = preregister
    ? (createSelected ? 'Создать аккаунт и записаться' : 'Записаться на участие')
    : (createSelected
        ? 'Создать торговый аккаунт и участвовать'
        : (needsDeposit ? `Пополнить $${deficit} и участвовать` : 'Участвую'));

  return (
    <Modal
      open={open}
      onClose={onClose}
      title={preregister ? 'Предварительная запись' : 'Участие в контесте'}
      subtitle={contestName}
      size="l"
      footer={<>
        <Button variant="outline" size="m" onClick={onClose}>Отмена</Button>
        <Button variant="primary" size="m" disabled={!canJoin} onClick={handleParticipate}>
          {participateLabel}
        </Button>
      </>}
    >
      {preregister && (

const ClientContestTerms = ({ onNavigate, contestTypeId = 'volume', joinedContests = {}, onJoinContest, onCancelContest, onMarkContestSeen }) => {

  const [joinOpen, setJoinOpen] = useState(false);
  const contest = CLIENT_CONTESTS.find(c => c.typeId === contestTypeId) || CLIENT_CONTESTS[0];
  const requiresFunding = contestRequiresFunding(contest.typeId);
  const isUpcoming = contest.state === 'upcoming';
  const joinedState = joinedContests[contest.typeId];
  const alreadyJoined = !!joinedState;
  const joinedUpcoming = alreadyJoined && (isUpcoming || joinedState === 'upcoming');
  const ctaLabel = alreadyJoined
    ? (joinedUpcoming ? 'Отменить запись' : 'Открыть лидерборд')
    : (isUpcoming ? 'Записаться на участие' : 'Участвую');
  const ctaCaption = joinedUpcoming
    ? `Вы записаны на участие. Контест начнётся ${contest.startsAtLabel || contest.dates}.`
    : (alreadyJoined
        ? 'Вы уже участвуете — посмотрите своё место и статистику в лидерборде.'
        : (isUpcoming
            ? 'Нажимая «Записаться на участие», вы соглашаетесь с правилами контеста и условиями участия.'
            : 'Нажимая «Участвую», вы соглашаетесь с правилами контеста и условиями участия.'));
  const handleCancel = () => {

    onCancelContest && onCancelContest(contest.typeId);

      label: 'Отменить',
      onClick: () => onJoinContest && onJoinContest(contest.typeId, prev),

    if (!onMarkContestSeen || !contest?.typeId) return;
    const meta = CLIENT_CONTESTS.find(c => c.typeId === contest.typeId);

  }, [contest.typeId, onMarkContestSeen]);

    <div className="screen-enter">
      <Breadcrumb items={[{label:'Контесты', onClick:() => onNavigate('list')}, {label:'Детали контеста'}]} />
      <div style={{textAlign:'center',marginBottom:'var(--ds-dim-6xl)'}}>
        <div style={{marginBottom:'var(--ds-dim-3xl)'}}><span className="icon-circle icon-circle--primary" style={{width:64,height:64}}><svg width="32" height="32"><use href="#ic-market-watch-24"/></svg></span></div>
        <div style={{display:'inline-flex',alignItems:'center',gap:'var(--ds-dim-2xl)',justifyContent:'center'}}>
          <h1 className="rig-title-02">{contest.name}</h1>
          <ContestTypeInfo typeId={contest.typeId} />
        </div>
        <p className="rig-body-01" style={{color:'var(--ds-text-muted)',marginTop:'var(--ds-dim-2xl)'}}>{contest.desc}</p>
      </div>

      <div style={{marginBottom:'var(--ds-dim-3xl)'}}>
        <div className="stats">
          <StatCard value={contest.days || '—'} label="Осталось" />
          <StatCard value={String(contest.participants)} label="Участников" />
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:'var(--ds-dim-3xl)',marginBottom:'var(--ds-dim-6xl)'}} className="terms-grid">
        <div className="card">
          <div className="card__header"><h4 className="rig-title-04"><Icon name="clipboard" size="sm" style={{marginRight:'var(--ds-dim-s)'}} /> Правила</h4></div>
          <div className="card__body">
            <BulletList items={[
              ...(requiresFunding ? [
                `Минимальный баланс клиента: $${MIN_BALANCE_USD}`,
                'Участвует только 1 торговый аккаунт клиента',
              ] : []),
              'Минимальный объём сделки: 0.01 лота (только сделки по правилу валидного лота)',

            ]} />
          </div>
        </div>
        <div className="card">
          <div className="card__header"><h4 className="rig-title-04"><Icon name="gift" size="sm" style={{marginRight:'var(--ds-dim-s)'}} /> Призы</h4></div>
          <div className="card__body">
            <div style={{display:'flex',flexDirection:'column',gap:'var(--ds-dim-3xl)'}}>
              {(contest.prizes || []).map(p => (
                <div key={p.pos} style={{display:'flex',alignItems:'center',gap:'var(--ds-dim-2xl)'}}>
                  <PrizeRank position={p.pos} />
                  <span className="rig-body-02" style={{flex:1,color:'var(--ds-text-primary)'}}>{p.pos} место</span>
                  <span className="rig-body-02-bold" style={{color:'var(--ds-text-primary)',fontVariantNumeric:'tabular-nums'}}>

          </div>

      </div>

      <div style={{display:'flex', justifyContent:'center', alignItems:'center', marginTop:'var(--ds-dim-3xl)'}}>
        {joinedUpcoming ? (
          <Button variant="outline" size="l" icon="trash" onClick={handleCancel} style={{minWidth: 360, paddingLeft:'var(--ds-dim-6xl)', paddingRight:'var(--ds-dim-6xl)'}}>{ctaLabel}</Button>
        ) : alreadyJoined ? (
          <Button variant="primary" size="l" icon="trophy" onClick={() => onNavigate('board')} style={{minWidth: 360, paddingLeft:'var(--ds-dim-6xl)', paddingRight:'var(--ds-dim-6xl)'}}>{ctaLabel}</Button>
        ) : (
          <Button variant="primary" size="l" icon={isUpcoming ? 'clock' : undefined} onClick={() => setJoinOpen(true)} style={{minWidth: 360, paddingLeft:'var(--ds-dim-6xl)', paddingRight:'var(--ds-dim-6xl)'}}>{ctaLabel}</Button>
        )}
      </div>
      <p className="rig-utility-01" style={{color:'var(--ds-text-placeholder)',textAlign:'center',marginTop:'var(--ds-dim-3xl)'}}>{ctaCaption}</p>

      <JoinContestModal
        open={joinOpen}
        onClose={() => setJoinOpen(false)}
        contestName={contest.name}
        contestType={contest.typeId}
        preregister={isUpcoming}
        startsAtLabel={contest.startsAtLabel}
        onJoin={(account) => {
          setJoinOpen(false);
          onJoinContest && onJoinContest(contest.typeId, isUpcoming ? 'upcoming' : 'active');
          if (isUpcoming) {
            showToast(
              `Запись подтверждена. Участие начнётся ${contest.startsAtLabel || contest.dates}`,
              'positive'
            );
            return;
          }
          onNavigate('board');
          showToast(
            account
              ? `Вы участвуете на аккаунте ${account.type} #${account.number}!`
              : 'Вы участвуете в контесте!',
            'positive'
          );
        }}
      />
    </div>
  );
};

const ClientLeaderboard = ({ onNavigate, contestTypeId = 'volume', onMarkContestSeen }) => {
  const youRowRef = useRef(null);
  const scrollContainerRef = useRef(null);
  const [flash, setFlash] = useState(false);
  const [youInView, setYouInView] = useState(true);
  const [youAbove, setYouAbove] = useState(false);
  const flashTimerRef = useRef(null);
  const scrollToYou = () => {
    const row = youRowRef.current;
    const scroller = scrollContainerRef.current;
    if (row && scroller) {
      const rowRect = row.getBoundingClientRect();
      const sRect = scroller.getBoundingClientRect();
      const offset = (rowRect.top - sRect.top) - (sRect.height / 2) + (rowRect.height / 2);
      scroller.scrollTo({ top: scroller.scrollTop + offset, behavior: 'smooth' });
    } else if (row) {
      row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    if (flashTimerRef.current) clearTimeout(flashTimerRef.current);
    setFlash(false);
    requestAnimationFrame(() => {
      setFlash(true);
      flashTimerRef.current = setTimeout(() => setFlash(false), 3400);
    });
  };
  useEffect(() => () => { if (flashTimerRef.current) clearTimeout(flashTimerRef.current); }, []);
  useEffect(() => {
    const row = youRowRef.current;
    const scroller = scrollContainerRef.current;
    if (!row || !scroller || typeof IntersectionObserver === 'undefined') return;
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach(e => {
          setYouInView(e.isIntersecting);
          if (e.boundingClientRect && e.rootBounds) {
            setYouAbove(e.boundingClientRect.bottom < e.rootBounds.top + 44);
          }
        });
      },
      { root: scroller, threshold: 0.01, rootMargin: '-44px 0px -72px 0px' }
    );
    io.observe(row);
    return () => io.disconnect();
  }, [contestTypeId]);
  const isCompletedRoute = String(contestTypeId).startsWith('completed:');
  const contest = isCompletedRoute
    ? (CLIENT_COMPLETED_CONTESTS.find(c => c.name === String(contestTypeId).slice('completed:'.length)) || CLIENT_COMPLETED_CONTESTS[0])
    : (CLIENT_CONTESTS.find(c => c.typeId === contestTypeId) || CLIENT_CONTESTS[0]);
  /* Переход с «Результаты» в списке завершённых всегда с префиксом completed: — фиксируем экран как итоговый, даже при рассинхроне данных */
  const isCompleted = isCompletedRoute || contest.state === 'completed';
  const ctype = CONTEST_TYPES[contest.typeId] || CONTEST_TYPES.volume;
  useEffect(() => {
    if (!onMarkContestSeen || !contest?.typeId) return;
    const meta = CLIENT_CONTESTS.find(c => c.typeId === contest.typeId);
    if (meta?.isNew) onMarkContestSeen(contest.typeId);
  }, [contest.typeId, onMarkContestSeen]);
  const stripPrize = (s) => String(s || '').replace(/\s*бонус$/i, '');
  const prizesTop = (contest.prizes || []).slice(0, 3).map(p => stripPrize(p.prize));
  const total = Math.max(contest.participants || 0, isCompleted ? (contest.yourPlace || 0) : 12);
  const yourPlace = isCompleted ? (contest.yourPlace || 0) : 12;
  const initialsAt = (i) => {
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    return `${letters[i % 26]}${letters[(i * 7 + 3) % 26]}****`;
  };
  const valueAt = (p) => {
    const base = 260;
    const v = base * Math.pow(0.94, p - 1);
    return v.toFixed(1);
  };
  const rows = Array.from({length: total}).map((_, i) => {
    const p = i + 1;
    const isYou = p === yourPlace;
    return {
      p,
      isYou,
      n: isYou ? 'Вы' : initialsAt(i + 5),
      v: isYou && isCompleted ? '—' : valueAt(p),
      pr: p <= 3 ? (prizesTop[p - 1] || '—')
          : (isYou && isCompleted ? (contest.yourReward ? stripPrize(contest.yourReward) : '—') : '—'),
    };
  });
  return (
  <div className="screen-enter">
    <Breadcrumb items={[{label:'Контесты', onClick:() => onNavigate('list')}, {label: isCompleted ? 'Результаты' : 'Лидерборд'}]} />
    {isCompleted && (
      <div style={{marginBottom:'var(--ds-dim-4xl)'}}>
        <Notification
          variant="neutral"
          icon="trophy"
          title="Контест завершён"
          description="Вы на странице итогов: рейтинг и призы зафиксированы на дату окончания и больше не обновляются."
        />
      </div>
    )}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'var(--ds-dim-5xl)',gap:'var(--ds-dim-3xl)',flexWrap:'wrap'}}>
      <div style={{display:'flex',alignItems:'center',gap:'var(--ds-dim-2xl)'}}>
        <h1 className="rig-title-02">{contest.name}</h1>
        <ContestTypeInfo typeId={contest.typeId} />
      </div>
      {isCompleted ? (
        <span style={{display:'flex',alignItems:'center',gap:'var(--ds-dim-2xl)'}}>
          <Tag label="Завершён" variant="neutral" />
          <span className="rig-body-02" style={{color:'var(--ds-text-muted)'}}>{contest.dates}, 23:59 UTC</span>
        </span>
      ) : (
        <span style={{display:'flex',alignItems:'center',gap:'var(--ds-dim-2xl)'}}>
          <Tag label="Active" variant="positive" />
          <span className="rig-body-02" style={{color:'var(--ds-text-muted)'}}>
            Завершается {(contest.dates || '').split(' — ')[1] || contest.dates}, 23:59 UTC
          </span>
        </span>
      )}
    </div>

    {isCompleted ? (
      <div className="user-progress">
        <div className="user-progress__row">
          <div className="user-progress__rank" style={{flexDirection:'column',alignItems:'flex-start',gap:'var(--ds-dim-m)'}}>
            <div style={{display:'flex',alignItems:'baseline',gap:'var(--ds-dim-2xl)',flexWrap:'wrap'}}>
              <span className="user-progress__place">#{contest.yourPlace}</span>
              <span className="user-progress__place-meta">из {contest.participants} участников</span>
            </div>
            <div className="user-progress__place-meta">
              Финальный результат: <strong style={{color:'var(--ds-on-primary)',fontWeight:700,fontVariantNumeric:'tabular-nums',marginLeft:4}}>{valueAt(contest.yourPlace)}</strong> <span style={{opacity:0.7}}>{ctype.metric}</span>
            </div>
          </div>
          <div className="user-progress__score">
            <span className="user-progress__score-value">
              {contest.yourReward ? stripPrize(contest.yourReward) : 'Без приза'}
            </span>
            <span className="user-progress__score-meta">{contest.yourReward ? 'Награда зачислена на торговый счёт' : 'В этот раз не попали в призовую зону'}</span>
          </div>
        </div>
      </div>
    ) : (
      <div className="user-progress">
        <div className="user-progress__row">
          <div className="user-progress__rank">
            <span className="user-progress__place">#12</span>
            <span className="user-progress__place-meta">из {contest.participants || '—'} участников · Top 25%</span>
          </div>
          <div className="user-progress__score">
            <span className="user-progress__score-value">67.4 <span className="user-progress__score-unit">лот</span></span>
            <span className="user-progress__score-meta">До 3 места: ещё 88.8 лот</span>
          </div>
        </div>
        <div className="user-progress__bar">
          <ProgressBar value={43} size="m" onBrand />
        </div>
        <div className="user-progress__caption">
          <span>До призовой зоны <strong>43%</strong></span>
          <span style={{display:'inline-flex',alignItems:'center',gap:'var(--ds-dim-2xl)'}}>
            <Icon name="clock" size="sm" /> Осталось {contest.days || '—'} 4 ч
          </span>
        </div>
      </div>
    )}

    <div className="table-header leaderboard-table-header">
      <h4 className="rig-title-04">
        {isCompleted ? 'Финальные результаты' : 'Лидерборд'}
        <span style={{color:'var(--ds-text-muted)',fontWeight:400,marginLeft:'var(--ds-dim-2xl)'}}>· {total} участников</span>
      </h4>
      <span className="table-header__meta">{isCompleted ? `Подведено ${(contest.dates.split(' — ')[1] || contest.dates)}, 23:59 UTC` : 'Обновлено: 2 мин назад'}</span>
    </div>
    <div className="table-wrap table-wrap--leaderboard">
      <div className="leaderboard-scroll" ref={scrollContainerRef}>
        <table>
          <thead><tr>
            <th className="lb-col-place">Место</th>
            <th className="lb-col-name">Участник</th>
            <th className="lb-col-score">{ctype.metric}</th>
            <th className="lb-col-prize">Приз</th>
          </tr></thead>
          <tbody>
            {(() => {
              const you = rows.find(r => r.isYou);
              if (!you) return null;
              const showTopPin = !youInView && youAbove;
              return (
                <tr
                  className={`leaderboard-pin leaderboard-pin--top ${showTopPin ? '' : 'leaderboard-pin--hidden'}`}
                  style={{cursor:'pointer'}}
                  onClick={scrollToYou}
                >
                  <td className="lb-col-place">
                    <span className="medal" style={{background:'var(--ds-primary-content)',color:'var(--ds-primary)'}}>{you.p}</span>
                  </td>
                  <td className="lb-col-name">
                    <Icon name="star-solid" size="xs" style={{color:'var(--ds-primary)',marginRight:2}} /> Вы
                    <span
                      role="button"
                      tabIndex={0}
                      onClick={(e) => { e.stopPropagation(); scrollToYou(); }}
                      onKeyDown={(e) => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); e.stopPropagation(); scrollToYou(); } }}
                      className="leaderboard-pin__link"
                    >Показать в рейтинге</span>
                  </td>
                  <td className="lb-col-score">{you.v}</td>
                  <td className="lb-col-prize">{you.pr}</td>
                </tr>
              );
            })()}
            {rows.map(r => {
              const cls = `${r.isYou ? 'highlight' : ''} ${r.isYou && flash ? 'leaderboard-flash' : ''}`.trim();
              return (
                <tr key={r.p} ref={r.isYou ? youRowRef : null} className={cls}>
                  <td className="lb-col-place">
                    {r.isYou
                      ? <span className="medal" style={{background:'var(--ds-primary-content)',color:'var(--ds-primary)'}}>{r.p}</span>
                      : <Medal position={r.p}/>}
                  </td>
                  <td className="lb-col-name">
                    {r.isYou
                      ? (<><Icon name="star-solid" size="xs" style={{color:'var(--ds-primary)',marginRight:2}} /> Вы</>)
                      : (r.p <= 3 ? <strong>{r.n}</strong> : r.n)}
                  </td>
                  <td className="lb-col-score">{r.v}</td>
                  <td className="lb-col-prize" style={{color: r.pr === '—' ? 'var(--ds-text-muted)' : undefined}}>{r.pr}</td>
                </tr>
              );
            })}
            {(() => {
              const you = rows.find(r => r.isYou);
              if (!you) return null;
              const showBottomPin = !youInView && !youAbove;
              return (
                <tr
                  className={`leaderboard-pin leaderboard-pin--bottom ${showBottomPin ? '' : 'leaderboard-pin--hidden'}`}
                  style={{cursor:'pointer'}}
                  onClick={scrollToYou}
                >
                  <td className="lb-col-place">
                    <span className="medal" style={{background:'var(--ds-primary-content)',color:'var(--ds-primary)'}}>{you.p}</span>
                  </td>
                  <td className="lb-col-name">
                    <Icon name="star-solid" size="xs" style={{color:'var(--ds-primary)',marginRight:2}} /> Вы
                    <span
                      role="button"
                      tabIndex={0}
                      onClick={(e) => { e.stopPropagation(); scrollToYou(); }}
                      onKeyDown={(e) => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); e.stopPropagation(); scrollToYou(); } }}
                      className="leaderboard-pin__link"
                    >Показать в рейтинге</span>
                  </td>
                  <td className="lb-col-score">{you.v}</td>
                  <td className="lb-col-prize">{you.pr}</td>
                </tr>
              );
            })()}
          </tbody>
        </table>
      </div>
    </div>
  </div>
  );
};

/* ═══════════════════════════════════════════════════════
   APP SHELL
   ═══════════════════════════════════════════════════════ */

const App = () => {
  const [role, setRole] = useState('ib');
  const [ibScreen, setIbScreen] = useState('list');
  const [ibRows, setIbRows] = useState(IB_CONTEST_ROWS);
  const [selectedIbContestName, setSelectedIbContestName] = useState(null);
  const [clientScreen, setClientScreen] = useState('list');
  const [clientContestTypeId, setClientContestTypeId] = useState('volume');
  const [joinedContests, setJoinedContests] = useState({ volume: 'active' });
  const markContestJoined = (typeId, mode = 'active') =>
    setJoinedContests(prev => ({ ...prev, [typeId]: mode }));
  const cancelContest = (typeId) =>
    setJoinedContests(prev => { const next = { ...prev }; delete next[typeId]; return next; });
  const [adminScreen, setAdminScreen] = useState('dashboard');

  /* Прототип: «просмотренные» не сохраняем — после F5 снова видны New и точка */
  const [seenContestTypes, setSeenContestTypes] = useState(() => new Set());
  const markContestTypeSeen = useCallback((typeId) => {
    if (!typeId) return;
    setSeenContestTypes(prev => {
      if (prev.has(typeId)) return prev;
      const n = new Set(prev);
      n.add(typeId);
      return n;
    });
  }, []);
  const clientNewContestsCount = useMemo(
    () => (role === 'client'
      ? CLIENT_CONTESTS.filter(c => c.isNew && !seenContestTypes.has(c.typeId)).length
      : 0),
    [role, seenContestTypes]
  );

  const addIbContest = (row) => setIbRows(prev => {
    const base = row.name;
    const existing = new Set(prev.map(r => r.name));
    let name = base, i = 2;
    while (existing.has(name)) { name = `${base} (${i++})`; }
    return [{ ...row, name }, ...prev];
  });

  const handleRoleChange = r => {
    setRole(r);
    if (r === 'ib') setIbScreen('list');
    if (r === 'client') setClientScreen('list');
    if (r === 'admin') setAdminScreen('dashboard');
    window.scrollTo(0, 0);
  };

  const navIB = s => { setIbScreen(s); window.scrollTo(0, 0); };
  const navClient = s => { setClientScreen(s); window.scrollTo(0, 0); };
  const navAdmin = s => { setAdminScreen(s); window.scrollTo(0, 0); };

  return (
    <ToastProvider>
      <RolePreviewBar role={role} onRoleChange={handleRoleChange} />
      <AppHeader
        role={role}
        activeKey={
          role === 'admin' && adminScreen === 'dashboard' ? 'dashboard' : 'contests'
        }
        clientNewContestsCount={clientNewContestsCount}
        clientContestsTotal={CLIENT_CONTESTS.length}
      />
      <div className="app">
        {role === 'ib' && (
          <Container className={ibScreen === 'wizard' ? 'ds-container--split' : ''}>
            {ibScreen === 'list' && <IBMyContests onNavigate={navIB} rows={ibRows} setRows={setIbRows} onSelectContest={setSelectedIbContestName} />}
            {ibScreen === 'wizard' && <IBCreateContest onNavigate={navIB} onCreateContest={addIbContest} />}
            {ibScreen === 'detail' && <IBContestDetail onNavigate={navIB} contest={ibRows.find(r => r.name === selectedIbContestName)} />}
          </Container>
        )}
        {role === 'client' && (
          <Container>
            {clientScreen === 'list' && <ClientContestList onNavigate={navClient} onSelectContest={setClientContestTypeId} joinedContests={joinedContests} onCancelContest={cancelContest} onJoinContest={markContestJoined} seenContestTypes={seenContestTypes} onMarkContestSeen={markContestTypeSeen} />}
            {clientScreen === 'terms' && <ClientContestTerms onNavigate={navClient} contestTypeId={clientContestTypeId} joinedContests={joinedContests} onJoinContest={markContestJoined} onCancelContest={cancelContest} onMarkContestSeen={markContestTypeSeen} />}
            {clientScreen === 'board' && <ClientLeaderboard onNavigate={navClient} contestTypeId={clientContestTypeId} onMarkContestSeen={markContestTypeSeen} />}
          </Container>
        )}
        {role === 'admin' && (
          <Container>
            {adminScreen === 'dashboard' && <AdminDashboard onNavigate={navAdmin} />}
            {adminScreen === 'detail' && <AdminContestDetail onNavigate={navAdmin} />}
          </Container>
        )}
      </div>
    </ToastProvider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
