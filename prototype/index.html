];

const JoinContestModal = ({ open, onClose, onJoin, contestName }) => {
  const [accounts, setAccounts] = useState(INITIAL_TRADING_ACCOUNTS);
  const [selectedId, setSelectedId] = useState(null);
  const [mode, setMode] = useState('select');
  const [newAccountType, setNewAccountType] = useState('MT5');
  const [depositAmount, setDepositAmount] = useState('');

  useEffect(() => {
    if (open) {
      setAccounts(INITIAL_TRADING_ACCOUNTS);
      setSelectedId(null);
      setMode('select');
      setNewAccountType('MT5');
      setDepositAmount('');
    }
  }, [open]);

  const selected = accounts.find(a => a.id === selectedId) || null;
  const deficit = selected ? Math.max(0, MIN_BALANCE_USD - selected.balance) : 0;
  const needsDeposit = !!selected && selected.balance < MIN_BALANCE_USD;
  const canJoin = !!selected && selected.balance >= MIN_BALANCE_USD;

  const handleCreateAccount = () => {
    const num = String(5300000 + Math.floor(Math.random() * 999999));
    const newAcc = { id: `new-${num}`, type: newAccountType, number: num, label: 'Новый', balance: 0, currency: 'USD' };
    setAccounts([newAcc, ...accounts]);
    setSelectedId(newAcc.id);
    setMode('select');
    setDepositAmount(String(MIN_BALANCE_USD));
  };

  const handleDeposit = () => {
    const amount = Number(depositAmount);
    if (!selected || !amount || amount <= 0) return;
    setAccounts(accounts.map(a => a.id === selected.id ? { ...a, balance: a.balance + amount } : a));
    setDepositAmount('');
  };

  return (
    <Modal
      open={open}
      onClose={onClose}
      title="Участие в контесте"
      subtitle={contestName}
      size="l"
      footer={<>
        <Button variant="outline" size="m" onClick={onClose}>Отмена</Button>
        <Button variant="primary" size="m" disabled={!canJoin} onClick={() => selected && onJoin(selected)}>Участвую</Button>
      </>}
    >
      <div className="join-rules">
        <div className="join-rules__title">Условия участия</div>
        <div className="join-rules__grid">
          <div>
            <div className="join-rules__label">Минимальный баланс</div>
            <div className="join-rules__value">${MIN_BALANCE_USD}</div>
          </div>
          <div>
            <div className="join-rules__label">
              Мин. объём сделки
              <InfoTip placement="bottom">
                Учитываются только сделки, проходящие по правилу валидного лота.
                <br /><br />
                <strong>Валидный лот</strong> — сделка удерживалась минимум 3 минуты и прошла минимум 3 пипса.
              </InfoTip>
            </div>
            <div className="join-rules__value">0.01 лота</div>
          </div>
          <div>
            <div className="join-rules__label">Торговый аккаунт</div>
            <div className="join-rules__value">1</div>
          </div>
        </div>
      </div>

      <div className="section-title" style={{marginTop:'var(--ds-dim-4xl)', marginBottom:'var(--ds-dim-2xl)'}}>
        Выберите торговый аккаунт
      </div>

      <div className="rig-radio-cards">
        {accounts.map(a => {
          const low = a.balance < MIN_BALANCE_USD;
          return (
            <div
              key={a.id}
              className={`rig-radio-card ${selectedId === a.id ? 'rig-radio-card--selected' : ''}`}
              onClick={() => setSelectedId(a.id)}
            >
              <div className="icon-circle icon-circle--primary" style={{flexShrink:0}}>
                <svg width="20" height="20"><use href="#ic-market-watch-24"/></svg>
              </div>
              <div style={{flex:1, minWidth:0}}>
                <div style={{display:'flex', alignItems:'center', gap:'var(--ds-dim-m)', flexWrap:'wrap'}}>
                  <div className="rig-body-02-bold">{a.type} #{a.number}</div>
                  {low && <Tag label="Недостаточно средств" variant="warning" icon="alert-triangle" />}
                </div>
                <div className="rig-utility-01" style={{color:'var(--ds-text-muted)', marginTop:'var(--ds-dim-xs)'}}>
                  Баланс: <strong style={{color: low ? 'var(--ds-warning)' : 'var(--ds-text-primary)'}}>${a.balance.toLocaleString('en-US')}</strong> · {a.label}
                </div>
              </div>
              <span className="rig-radio-card__trail" aria-hidden="true">
                {selectedId === a.id && <svg><use href="#ic-check-24"/></svg>}
              </span>
            </div>
          );
        })}

        {mode === 'create' ? (
          <div className="info-box" style={{marginTop:0, flexDirection:'column', alignItems:'stretch', gap:'var(--ds-dim-2xl)'}}>
            <div style={{display:'flex', alignItems:'center', gap:'var(--ds-dim-2xl)'}}>
              <Icon name="info" size="sm" style={{color:'var(--ds-primary)'}} />
              <span className="rig-body-02-bold">Новый торговый аккаунт</span>
            </div>
            <div className="join-deposit">
              <Select
                label="Платформа"
                value={newAccountType}
                onChange={setNewAccountType}
                options={[{value:'MT5', label:'MetaTrader 5'}, {value:'MT4', label:'MetaTrader 4'}]}
              />
              <Button variant="primary" size="m" icon="plus" onClick={handleCreateAccount}>Создать</Button>
              <Button variant="outline" size="m" onClick={() => setMode('select')}>Отмена</Button>

const App = () => {
  const [role, setRole] = useState('ib');
  const [ibScreen, setIbScreen] = useState('list');
  const [clientScreen, setClientScreen] = useState('list');
  const [adminScreen, setAdminScreen] = useState('dashboard');

  const handleRoleChange = r => {
    setRole(r);
    if (r === 'ib') setIbScreen('list');
    if (r === 'client') setClientScreen('list');
    if (r === 'admin') setAdminScreen('dashboard');
    window.scrollTo(0, 0);
  };

  const navIB = s => { setIbScreen(s); window.scrollTo(0, 0); };
  const navClient = s => { setClientScreen(s); window.scrollTo(0, 0); };
  const navAdmin = s => { setAdminScreen(s); window.scrollTo(0, 0); };

  return (
    <ToastProvider>
      <RolePreviewBar role={role} onRoleChange={handleRoleChange} />
      <AppHeader role={role} />
      <div className="app">
        {role === 'ib' && (
          <Container className={ibScreen === 'wizard' ? 'ds-container--split' : ''}>
            {ibScreen === 'list' && <IBMyContests onNavigate={navIB} />}
            {ibScreen === 'wizard' && <IBCreateContest onNavigate={navIB} />}
            {ibScreen === 'detail' && <IBContestDetail onNavigate={navIB} />}
          </Container>
        )}
        {role === 'client' && (
          <Container>
            {clientScreen === 'list' && <ClientContestList onNavigate={navClient} />}
            {clientScreen === 'terms' && <ClientContestTerms onNavigate={navClient} />}
            {clientScreen === 'board' && <ClientLeaderboard onNavigate={navClient} />}
          </Container>
        )}
        {role === 'admin' && (
          <Container>
            {adminScreen === 'dashboard' && <AdminDashboard onNavigate={navAdmin} />}
            {adminScreen === 'detail' && <AdminContestDetail onNavigate={navAdmin} />}
          </Container>
        )}
      </div>
    </ToastProvider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
