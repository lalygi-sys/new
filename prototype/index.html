/* DS Input — label floats inside the field per RIG Storybook.
   Supports leftIcon, rightIcon, prefix, textarea, and a "button" mode used by
   wrappers like CalendarInput and Select that handle value rendering themselves.
*/
const Input = ({
  label, description, error, type = 'text',
  leftIcon, rightIcon, prefix,
  value, onChange, placeholder, disabled,
  onClick, asButton, children,
  size = 'M',
  style, className = '',
  ...rest
}) => {
  const [focused, setFocused] = useState(false);
  const hasValue = asButton ? !!children : value !== undefined && value !== null && value !== '';
  const shellCls = [
    'ds-input-shell',
    size === 'S' ? 'ds-input-shell--s' : '',
    focused ? 'ds-input-shell--focus' : '',
    error ? 'ds-input-shell--error' : '',
    disabled ? 'ds-input-shell--disabled' : '',
    asButton ? 'ds-input-shell--button' : '',
    hasValue ? 'ds-input-shell--filled' : '',
    type === 'textarea' ? 'ds-input-shell--textarea' : '',
  ].filter(Boolean).join(' ');

  const renderIcon = (name, side) => name && (
    <span className={`ds-input-shell__icon ds-input-shell__icon--${side}`}>
      <svg><use href={dsIc(name)} /></svg>
    </span>
  );

  return (
    <div className={`ds-input-wrap ${className}`} style={style}>
      {label && <label className="ds-input-label">{label}</label>}
      <div className={shellCls} onClick={asButton ? onClick : undefined}
           onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}>
        {renderIcon(leftIcon, 'left')}
        {prefix && <span className="ds-input-shell__prefix">{prefix}</span>}
        {asButton ? (
          <span className="ds-input-field">{children}</span>
        ) : type === 'textarea' ? (
          <textarea className="ds-input-field"
            value={value} onChange={onChange} placeholder={placeholder} disabled={disabled}
            onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
            {...rest} />
        ) : (
          <input type={type} className="ds-input-field"
            value={value ?? ''} onChange={onChange} placeholder={placeholder} disabled={disabled}
            onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
            {...rest} />
        )}
        {renderIcon(rightIcon, 'right')}
      </div>
      {error && <div className="ds-input-error">{error}</div>}
      {description && !error && <div className="ds-input-desc">{description}</div>}
    </div>
  );
};

/* DS Dropdown (Select) — DS Input trigger + options popover */
const Select = ({ label, value, onChange, options = [], placeholder, description, error, leftIcon, size }) => {
  const [open, setOpen] = useState(false);
  const [dropAbove, setDropAbove] = useState(false);
  const [dropMaxH, setDropMaxH] = useState(320);
  const ref = useRef(null);

  const syncDropdownLayout = useCallback(() => {
    if (!ref.current) return;
    const rect = ref.current.getBoundingClientRect();
    const margin = 16;
    const spaceBelow = window.innerHeight - rect.bottom - margin;
    const spaceAbove = rect.top - margin;
    const flip = spaceBelow < 180 && spaceAbove > spaceBelow;
    const available = flip ? spaceAbove : spaceBelow;
    setDropAbove(flip);
    setDropMaxH(Math.max(120, Math.min(320, available)));
  }, []);

  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  useEffect(() => {
    if (!open) return;
    syncDropdownLayout();
    window.addEventListener('resize', syncDropdownLayout);
    window.addEventListener('scroll', syncDropdownLayout, true);
    return () => {
      window.removeEventListener('resize', syncDropdownLayout);
      window.removeEventListener('scroll', syncDropdownLayout, true);
    };
  }, [open, syncDropdownLayout]);

  const selected = options.find(o => o.value === value);
  return (
    <div ref={ref} style={{position:'relative', width:'100%', minWidth:0}}>
      <Input
        asButton label={label} leftIcon={leftIcon} rightIcon="chevron-down"
        description={description} error={error} size={size}
        onClick={() => setOpen(v => !v)}
      >
        {selected ? selected.label : (placeholder || '')}
      </Input>
      {open && (
        <div
          className={`ds-dropdown${dropAbove ? ' ds-dropdown--above' : ''}`}
          style={{ maxHeight: dropMaxH }}
        >
          {options.map(opt => (
            <div key={opt.value}
                 className={`ds-dropdown__option ${opt.value === value ? 'ds-dropdown__option--selected' : ''}`}
                 onClick={() => { onChange && onChange(opt.value); setOpen(false); }}>
              <span className="ds-dropdown__option-label">{opt.label}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

/* Mobile bottom sheet: scroll lock, enter animation, Escape to close. */
const useMobilePickerSheet = (open, onClose, sheetRef) => {
  const isMobile = useIsMobile();

  useEffect(() => {
    if (!open || !isMobile) return undefined;
    const scrollY = window.scrollY || document.documentElement.scrollTop || 0;
    document.body.classList.add('sheet-scroll-lock');
    document.body.style.top = `-${scrollY}px`;
    return () => {
      document.body.classList.remove('sheet-scroll-lock');
      document.body.style.top = '';
      window.scrollTo(0, scrollY);
    };
  }, [open, isMobile]);

  useLayoutEffect(() => {
    if (!open || !isMobile || !sheetRef?.current) return undefined;
    const el = sheetRef.current;
    requestAnimationFrame(() => el.classList.add('open'));
    return () => el.classList.remove('open');
  }, [open, isMobile, sheetRef]);

  useEffect(() => {
    if (!open) return undefined;
    const onKey = e => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  return isMobile;
};

const Modal = ({ open, onClose, title, headerMeta, subtitle, children, footer, size = 'm' }) => {
  const sheetRef = useRef(null);
  const isMobile = useMobilePickerSheet(open, onClose, sheetRef);

  useEffect(() => {
    if (!open || isMobile) return undefined;
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = prev; };
  }, [open, isMobile]);

  if (!open) return null;
  const maxWidth = size === 'l' ? 640 : size === 's' ? 420 : 520;

  const closeBtn = (
    <button
      className={isMobile ? 'dr-panel__close' : 'ds-modal__close'}
      onClick={onClose}
      aria-label="Close"
      type="button"
    >
      <svg><use href="#ic-cross-24"/></svg>
    </button>
  );

  const titleBlock = (
    <>
      {title && (
        typeof title === 'string'
          ? (isMobile
              ? <span className="dr-panel__title">{title}</span>
              : <div className="rig-title-03">{title}</div>)
          : (isMobile ? title : <div className="rig-title-03">{title}</div>)
      )}
      {subtitle && (
        isMobile
          ? <div className="rig-utility-01" style={{ color: 'var(--ds-text-muted)', marginTop: 'var(--ds-dim-xs)' }}>{subtitle}</div>
          : <div style={{ marginTop: 'var(--ds-dim-s)', color: 'var(--ds-text-muted)', fontSize: 14, lineHeight: '20px' }}>{subtitle}</div>
      )}
    </>
  );

  if (isMobile) {
    return ReactDOM.createPortal(
      <>
        <div className="dr-panel-backdrop open" onClick={onClose} aria-hidden="true" />
        <div
          ref={sheetRef}
          className="dr-panel dr-panel--sheet"
          role="dialog"
          onClick={e => e.stopPropagation()}
        >
          <div className={`dr-panel__head${subtitle ? ' dr-panel__head--stacked' : ''}`}>
            <div className="dr-panel__head-main">{titleBlock}</div>
            {headerMeta && <div className="ds-modal__header-meta">{headerMeta}</div>}
            {closeBtn}
          </div>
          <div className="dr-panel__body">{children}</div>
          {footer && <div className="dr-panel__foot ds-modal__foot--stack">{footer}</div>}
        </div>
      </>,
      document.body
    );
  }

  const modal = (
    <div className="ds-modal-overlay" onClick={onClose}>
      <div className="ds-modal" style={{ maxWidth }} onClick={e => e.stopPropagation()}>
        <div className="ds-modal__header">
          <div className="ds-modal__title">{titleBlock}</div>
          {headerMeta && <div className="ds-modal__header-meta">{headerMeta}</div>}
          {closeBtn}
        </div>
        <div className="ds-modal__body">{children}</div>
        {footer && <div className="ds-modal__footer">{footer}</div>}
      </div>
    </div>
  );
  return ReactDOM.createPortal(modal, document.body);
};

      className={`toast toast--${item.type} ${visible ? 'toast--visible' : ''}`}
      role="status"
      aria-live="polite"
    >
      <span className="toast__icon">{item.type === 'positive' ? TOAST_POSITIVE_ICON : TOAST_NEGATIVE_ICON}</span>
      <div className="toast__text">
        <span className="toast__msg">{item.msg}</span>
      </div>
      {item.action && (
        <button type="button" className="toast__action" onClick={() => onAction(item)}>
          {item.action.label}
        </button>
      )}
      <button type="button" className="toast__close" onClick={() => onClose(item.id)} aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><use href="#ic-cross-24" /></svg>
      </button>
    </div>
  );
};

const ToastProvider = ({ children }) => {
  const isMobile = useMediaQuery('(max-width: 639px)');
  const maxVisible = isMobile ? 1 : 2;
  const [visible, setVisible] = useState([]);
  const queueRef = useRef([]);
  const idRef = useRef(0);

  const flushQueue = useCallback((current) => {
    const next = [...current];
    while (next.length < maxVisible && queueRef.current.length > 0) {
      next.push(queueRef.current.shift());
    }
    return next;
  }, [maxVisible]);

  const dismissToast = useCallback((id) => {
    setVisible(current => flushQueue(current.filter(t => t.id !== id)));
  }, [flushQueue]);

  const handleAction = useCallback((item) => {
    if (item.action?.onClick) item.action.onClick();
    dismissToast(item.id);
  }, [dismissToast]);

  const showToast = useCallback((msg, type = 'negative', action) => {
    const item = { id: ++idRef.current, msg, type, action };
    setVisible(current => {
      if (current.length < maxVisible) {
        return [...current, item];
      }
      if (maxVisible === 1) {
        queueRef.current.push(item);
        return current;
      }
      const rest = current.slice(1);
      if (rest.length < maxVisible) {
        return [...rest, item];
      }
      queueRef.current.push(item);
      return rest;
    });
  }, [maxVisible]);

  useEffect(() => {
    setVisible(current => {
      if (current.length <= maxVisible) return current;
      queueRef.current.unshift(...current.slice(0, current.length - maxVisible));
      return current.slice(-maxVisible);
    });
  }, [maxVisible]);

  return (
    <ToastContext.Provider value={showToast}>
      {children}
      <div className="toast-stack" aria-label="Notifications">
        {visible.map(item => (
          <ToastSnackbar
            key={item.id}
            item={item}
            onClose={dismissToast}
            onAction={handleAction}
          />
        ))}
      </div>
    </ToastContext.Provider>
  );
};

/* MobileDrawer — full-screen nav panel (Figma 7pd3z node 1:37196).
   Top bar with close control; menu items Title 03 (20/24 semibold).
   Sections with dropdown show chevron and expand in place. */
const isMobileDrawerItemDisabled = (item) => {
  if (item.key === 'revenue' || item.key === 'promo') return false;
  return !!item.disabled;
};

const MobileDrawer = ({
  open,
  onClose,
  items = [],
  activeKey,
  onSelect,
  role,
  clientNewContestsCount = 0,
  clientContestsTotal = 0,
}) => {
  const [expandedKeys, setExpandedKeys] = useState(() => new Set());

  useEffect(() => {
    if (!open) return undefined;
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    const onKey = (e) => { if (e.key === 'Escape') onClose && onClose(); };
    document.addEventListener('keydown', onKey);
    const autoExpanded = new Set();
    items.forEach(item => {
      if (item.dropdown?.some(d => d.key === activeKey)) autoExpanded.add(item.key);
    });
    setExpandedKeys(autoExpanded);
    return () => {
      document.body.style.overflow = prev;
      document.removeEventListener('keydown', onKey);
    };
  }, [open, onClose, items, activeKey]);

  const toggleExpanded = (key) => {
    setExpandedKeys(prev => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key);
      else next.add(key);
      return next;
    });
  };

  const renderSubTrail = (sub) => {
    if (role === 'client' && sub.key === 'contests') {
      return (
        <span className="mobile-drawer__subitem-trail">
          <Tag label={String(clientContestsTotal)} variant="brand" />
          {clientNewContestsCount > 0 && <Tag label="New" variant="warning" />}
        </span>
      );
    }
    if (sub.badge) return <span className="mobile-drawer__subitem-trail"><Tag label={sub.badge} variant="brand" /></span>;
    return null;
  };

  return (
    <div
      className={`mobile-drawer ${open ? 'mobile-drawer--open' : ''}`}
      role="dialog"
      aria-modal="true"
      aria-label="Navigation menu"
      aria-hidden={!open}
    >
      <div className="mobile-drawer__topbar">
        <button
          type="button"
          className="mobile-drawer__close"
          onClick={onClose}
          aria-label="Close menu"
        >
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <use href="#ic-cross-24" />
          </svg>
        </button>
      </div>
      <div className="mobile-drawer__body">
        <nav className="mobile-drawer__menu" aria-label="Main menu">
          {items.map(item => {
            if (item.dropdown?.length) {
              const isOpen = expandedKeys.has(item.key);
              return (
                <div key={item.key} className="mobile-drawer__group">
                  <button
                    type="button"
                    className="mobile-drawer__item"
                    aria-expanded={isOpen}
                    onClick={() => toggleExpanded(item.key)}
                  >
                    <span className="mobile-drawer__item-row">
                      <span className="mobile-drawer__item-label">{item.label}</span>
                      <svg className={`mobile-drawer__chevron ${isOpen ? 'mobile-drawer__chevron--open' : ''}`} viewBox="0 0 24 24" aria-hidden="true">
                        <use href="#ic-chevron-down-24" />
                      </svg>
                    </span>
                  </button>
                  {isOpen && (
                    <div className="mobile-drawer__submenu">
                      {item.dropdown.map(sub => (
                        <button
                          key={sub.key}
                          type="button"
                          className={`mobile-drawer__subitem ${activeKey === sub.key ? 'mobile-drawer__subitem--active' : ''}`}
                          onClick={() => { onSelect && onSelect(sub); onClose && onClose(); }}
                        >
                          <span className="mobile-drawer__item-label">{sub.label}</span>
                          {renderSubTrail(sub)}
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              );
            }
            const drawerDisabled = isMobileDrawerItemDisabled(item);
            return (
              <button
                key={item.key}
                type="button"
                className={`mobile-drawer__item ${activeKey === item.key ? 'mobile-drawer__item--active' : ''}`}
                disabled={drawerDisabled}
                title={drawerDisabled ? 'Under maintenance' : undefined}
                onClick={() => {
                  if (drawerDisabled) return;
                  onSelect && onSelect(item);
                  onClose && onClose();
                }}
              >
                <span className="mobile-drawer__item-row">
                  <span className="mobile-drawer__item-label">{item.label}</span>
                  {item.badge ? <Tag label={item.badge} variant="brand" /> : null}
                </span>
              </button>
            );
          })}
        </nav>
      </div>
    </div>
  );
};

/* Компактные KPI-баннеры для списка контестов IB — «спортивная» мотивация + деловые метрики. */
/* Синхронизирует delta layout: если хоть в одной карточке delta не влезает в строку с числом — во всех под числом. */
const StatBannersLayout = ({ ariaLabel, children }) => {
  const ref = useRef(null);
  const [deltaStacked, setDeltaStacked] = useState(false);

  useHorizontalDragScroll(ref, {
    scrollableClass: 'is-stat-banners-scrollable',
    draggingClass: 'is-stat-banners-dragging',
  });

  const syncDeltaLayout = useCallback(() => {
    const root = ref.current;
    if (!root) return;
    let stacked = false;
    root.querySelectorAll('.stat-banner__value-row').forEach(row => {
      const value = row.querySelector('.stat-banner__value');
      const delta = row.querySelector('.stat-banner__delta');
      if (!value || !delta || !String(delta.textContent || '').trim()) return;
      const gap = parseFloat(getComputedStyle(row).columnGap || getComputedStyle(row).gap) || 8;
      if (value.scrollWidth + gap + delta.scrollWidth > row.clientWidth + 1) stacked = true;
    });
    setDeltaStacked(stacked);
  }, []);

  useLayoutEffect(() => {
    syncDeltaLayout();
    const root = ref.current;
    if (!root) return undefined;
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(syncDeltaLayout) : null;
    ro?.observe(root);
    root.querySelectorAll('.stat-banner').forEach(el => ro?.observe(el));
    window.addEventListener('resize', syncDeltaLayout);
    return () => {
      ro?.disconnect();
      window.removeEventListener('resize', syncDeltaLayout);
    };
  }, [syncDeltaLayout, children]);

  return (
    <div
      ref={ref}
      className={`stat-banners${deltaStacked ? ' stat-banners--delta-stacked' : ''}`}
      aria-label={ariaLabel}
    >
      {children}
    </div>
  );
};

const formatUsdCompact = (n) => '$' + Math.round(n).toLocaleString('en-US');

const computeIBContestStats = (rows) => {
  const activeRows = rows.filter(r => r.status === 'Active');
  const completedRows = rows.filter(r => r.status === 'Completed');
  const activeCount = activeRows.length;
  const activeParticipants = activeRows.reduce(
    (sum, r) => sum + (typeof r.count === 'number' ? r.count : 0), 0
  );
  const activeProfit = activeRows.reduce((sum, r) => sum + (r.ibProfit || 0), 0);
  const completedProfit = completedRows.reduce((sum, r) => sum + (r.ibProfit || 0), 0);
  const totalProfit = activeProfit + completedProfit;
  const prizePoolActive = activeRows.reduce((sum, r) => sum + (r.prizePool || 0), 0);
  const prizesGifted = completedRows.reduce((sum, r) => sum + (r.prizesGifted ?? r.prizePool ?? 0), 0);
  const prizePoolTotal = prizePoolActive + prizesGifted;
  const activationReturned = activeRows.reduce((sum, r) => sum + (r.activationReturned || 0), 0);
  const activationNew = activeRows.reduce((sum, r) => sum + (r.activationNew || 0), 0);
  const activationTotal = activationReturned + activationNew;
  const avgReach = activeCount ? Math.round(activeParticipants / activeCount) : 0;
  const reachCounts = activeRows.map(r => r.count).filter(n => typeof n === 'number');
  const minReach = reachCounts.length ? Math.min(...reachCounts) : 0;
  const maxReach = reachCounts.length ? Math.max(...reachCounts) : 0;
  return {
    activeCount, activeParticipants, avgReach, minReach, maxReach,
    activeProfit, completedProfit, totalProfit,
    prizePoolActive, prizesGifted, prizePoolTotal,
    activationReturned, activationNew, activationTotal,
  };
};

const hasMeasurableContests = (rows) =>
  rows.some(r => r.status === 'Active' || r.status === 'Completed');

const estimateDraftPotentialProfit = (draftRows, allRows) => {
  const typeAvg = {};
  for (const r of allRows) {
    if (r.status !== 'Active' || !r.ibProfit) continue;
    if (!typeAvg[r.typeId]) typeAvg[r.typeId] = { sum: 0, n: 0 };
    typeAvg[r.typeId].sum += r.ibProfit;
    typeAvg[r.typeId].n += 1;
  }
  const fallback = 150;
  return draftRows.reduce((sum, r) => {
    const avg = typeAvg[r.typeId];
    return sum + (avg ? Math.round(avg.sum / avg.n) : fallback);
  }, 0);
};

const IBContestDraftLaunchPanel = ({ draftRows, allRows, onNavigate, onSelectContest }) => {

const calSameDay = (a, b) => a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();

const DateRangeInput = ({
  label = 'Contest period',
  startDate, endDate, onChangeStart, onChangeEnd,
  defaultStartDate, defaultEndDate,
}) => {
  const [open, setOpen] = useState(false);
  const [range, setRange] = useState({ start: startDate, end: endDate });
  const initRef = range.start || range.end || new Date();
  const [viewYear, setViewYear] = useState(initRef.getFullYear());
  const [viewMonth, setViewMonth] = useState(initRef.getMonth());
  const ref = useRef();
  const sheetRef = useRef();
  const close = () => setOpen(false);
  const isMobile = useMobilePickerSheet(open, close, sheetRef);

  const defaultStart = defaultStartDate ?? null;
  const defaultEnd = defaultEndDate ?? null;

  useEffect(() => {
    if (open) return;
    setRange({ start: startDate, end: endDate });
  }, [startDate, endDate, open]);

  useEffect(() => {
    if (!open || isMobile) return;
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open, isMobile]);

  const today = new Date(); today.setHours(0, 0, 0, 0);
  const sd = range.start || null;
  const ed = range.end || null;
  const rangeSpan = sd && ed && !calSameDay(sd, ed);

  const isDefault = calSameDay(sd, defaultStart) && calSameDay(ed, defaultEnd);

  const display = sd && ed
    ? `${formatDate(sd)} — ${formatDate(ed)}`
    : sd
      ? `${formatDate(sd)} — …`
      : 'Select period';

  const navMonth = dir => {
    let m = viewMonth + dir, y = viewYear;
    if (m > 11) { m = 0; y++; } else if (m < 0) { m = 11; y--; }
    setViewMonth(m); setViewYear(y);
  };

  const applyRange = (next) => {
    setRange(next);
    onChangeStart(next.start);
    onChangeEnd(next.end ?? null);
  };

  const reset = () => {
    const next = { start: defaultStart, end: defaultEnd };
    applyRange(next);
    const refDate = defaultStart || defaultEnd || today;
    setViewYear(refDate.getFullYear());
    setViewMonth(refDate.getMonth());
  };

  const done = () => {
    applyRange(range);
    setOpen(false);
  };

  const handlePickDate = (dt) => {
    const ps = sd, pe = ed;
    let next;
    if (ps && pe) next = { start: dt, end: null };
    else if (ps && !pe) next = dt < ps ? { start: dt, end: ps } : { start: ps, end: dt };
    else next = { start: dt, end: null };
    applyRange(next);
    if (dt.getMonth() !== viewMonth || dt.getFullYear() !== viewYear) {
      setViewMonth(dt.getMonth());
      setViewYear(dt.getFullYear());
    }
  };

  const gridCells = buildMonthGridCells(viewYear, viewMonth);

  const calendar = (
    <div className="cal">
      <div className="cal-nav">
        <button type="button" className="dr-panel__navbtn" onClick={() => navMonth(-1)} aria-label="Previous month">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span className="dr-panel__month">{MONTHS[viewMonth]} {viewYear}</span>
        <button type="button" className="dr-panel__navbtn" onClick={() => navMonth(1)} aria-label="Next month">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div className="cal-grid">
        {DOW.map(d => <div key={d} className="cal-wd">{d}</div>)}
      </div>
      <div className="cal-grid">
        {gridCells.map((cell, i) => {
          const dt = cell.date;
          const isStart = sd && calSameDay(dt, sd);
          const isEnd = ed && calSameDay(dt, ed);
          const inRange = sd && ed && dt > sd && dt < ed;
          const cellCls = ['cal-cell'];
          if (inRange) cellCls.push('in-range');
          if (isStart && ed && rangeSpan) cellCls.push('is-start');
          if (isEnd && sd && rangeSpan) cellCls.push('is-end');
          const btnCls = ['cal-day'];
          if (cell.out) btnCls.push('out');
          if (calSameDay(dt, today)) btnCls.push('today');
          if (isStart) btnCls.push('is-start');
          if (isEnd) btnCls.push('is-end');
          return (
            <div key={i} className={cellCls.join(' ')}>

/* DateRangeTrigger — кнопка-триггер в тулбаре. Управляется снаружи: открытое
   состояние (`isOpen`) и выбранный диапазон (`range`). Используется в паре
   с `DateRangePanel`, который рендерится рядом с таблицей. */
const fmtDay = d => d ? `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}/${d.getFullYear()}` : '';

/* 6-недельная сетка от понедельника недели, содержащей 1-е число (как calRender в Rebate). */
const buildMonthGridCells = (viewYear, viewMonth) => {
  const first = new Date(viewYear, viewMonth, 1);
  const dow = (first.getDay() + 6) % 7;
  const gridStart = new Date(viewYear, viewMonth, 1 - dow);
  gridStart.setHours(0, 0, 0, 0);
  return Array.from({ length: 42 }, (_, i) => {
    const date = new Date(gridStart);
    date.setDate(gridStart.getDate() + i);
    return {
      date,
      label: date.getDate(),
      out: date.getMonth() !== viewMonth,
    };
  });
};

const dayDiffInclusive = (a, b) => {
  const ms = 86400000;
  const s = new Date(a.getFullYear(), a.getMonth(), a.getDate());
  const e = new Date(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.round((e - s) / ms) + 1;
};

const dateRangeButtonLabel = (range) => {
  if (range?.start && range?.end) return `${fmtDay(range.start)} — ${fmtDay(range.end)}`;
  if (range?.start) return `from ${fmtDay(range.start)}`;
  return '';
};

/* DateRangePanel — календарь как Rebate (#cal-main / calDayClick):
     • sd && ed → новый клик сбрасывает диапазон (start=день, end=null)
     • sd && !ed → второй клик ставит end (swap если раньше start)
     • полоса is-start/in-range/is-end только когда обе даты и они разные
     • out-дни соседних месяцев кликабельны и переключают видимый месяц */
const DateRangePanel = ({ range, onChange, onClose, defaultRange = { start: null, end: null }, sheet = false }) => {
  const sheetRef = useRef(null);
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const initRef = range?.start || range?.end || today;
  const [viewYear, setViewYear] = useState(initRef.getFullYear());
  const [viewMonth, setViewMonth] = useState(initRef.getMonth());

  const gridCells = buildMonthGridCells(viewYear, viewMonth);
  const sd = range?.start || null;
  const ed = range?.end || null;
  const sameDay = sameCalendarDay;

  const navMonth = dir => {
    let m = viewMonth + dir, y = viewYear;
    if (m > 11) { m = 0; y++; } else if (m < 0) { m = 11; y--; }
    setViewMonth(m); setViewYear(y);
  };

  const handlePickDate = (dt) => {
    onChange(prev => {
      const ps = prev?.start, pe = prev?.end;
      if (ps && pe) return { start: dt, end: null };
      if (ps && !pe) return dt < ps ? { start: dt, end: ps } : { start: ps, end: dt };
      return { start: dt, end: null };
    });
    if (dt.getMonth() !== viewMonth || dt.getFullYear() !== viewYear) {
      setViewMonth(dt.getMonth());
      setViewYear(dt.getFullYear());
    }
  };

  const reset = () => {
    onChange(defaultRange);
    const ref = defaultRange?.start || defaultRange?.end || today;
    setViewYear(ref.getFullYear());
    setViewMonth(ref.getMonth());
  };

  const daysSelected = (sd && ed) ? dayDiffInclusive(sd, ed) : 0;
  const daysWord = (n) => (n === 1 ? 'day' : 'days');

  const activeBound = !sd ? 'start' : (!ed ? 'end' : null);
  const rangeSpan = sd && ed && !sameDay(sd, ed);

  useLayoutEffect(() => {
    if (!sheet || !sheetRef.current) return undefined;
    const el = sheetRef.current;
    requestAnimationFrame(() => el.classList.add('open'));
    return () => el.classList.remove('open');
  }, [sheet]);

  return (
    <div
      ref={sheet ? sheetRef : null}
      className={`dr-panel${sheet ? ' dr-panel--sheet' : ''}`}
      role="dialog"
      aria-label="Contest period"
    >
      <div className="dr-panel__head">
        <span className="dr-panel__title">Contest period</span>
        <button type="button" className="dr-panel__close" onClick={onClose} aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none"><use href="#ic-cross-24"/></svg>
        </button>
      </div>
      <div className="dr-panel__body">
        <div className="dr-panel__inputs">
          <Input
            size="S"
            label="Start date"
            value={range?.start ? fmtDay(range.start) : ''}
            placeholder="mm/dd/yyyy"
            readOnly
            className={activeBound === 'start' ? 'dr-panel__input--active' : ''}
          />
          <Input
            size="S"
            label="End date"
            value={range?.end ? fmtDay(range.end) : ''}
            placeholder="mm/dd/yyyy"
            readOnly
            className={activeBound === 'end' ? 'dr-panel__input--active' : ''}
          />
        </div>
        <div className="cal" id="cal-main">
          <div className="cal-nav">
            <button type="button" className="dr-panel__navbtn" onClick={() => navMonth(-1)} aria-label="Previous month">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span className="dr-panel__month" id="cal-title-main">{MONTHS[viewMonth]} {viewYear}</span>
            <button type="button" className="dr-panel__navbtn" onClick={() => navMonth(1)} aria-label="Next month">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
          <div className="cal-grid" id="cal-wd-main">
            {DOW.map(d => <div key={d} className="cal-wd">{d}</div>)}
          </div>
          <div className="cal-grid" id="cal-grid-main">
            {gridCells.map((cell, i) => {
              const dt = cell.date;
              const isStart = sd && sameDay(dt, sd);
              const isEnd = ed && sameDay(dt, ed);
              const inRange = sd && ed && dt > sd && dt < ed;
              const cellCls = ['cal-cell'];
              if (inRange) cellCls.push('in-range');
              if (isStart && ed && rangeSpan) cellCls.push('is-start');
              if (isEnd && sd && rangeSpan) cellCls.push('is-end');
              const btnCls = ['cal-day'];
              if (cell.out) btnCls.push('out');
              if (sameDay(dt, today)) btnCls.push('today');
              if (isStart) btnCls.push('is-start');
              if (isEnd) btnCls.push('is-end');
              return (
                <div key={i} className={cellCls.join(' ')}>
                  <button
                    type="button"
                    className={btnCls.join(' ')}
                    onClick={() => handlePickDate(dt)}
                  >{cell.label}</button>
                </div>
              );
            })}
          </div>
        </div>
      </div>
      <div className="dr-panel__foot">
        <span className="dr-panel__count">
          {daysSelected > 0
            ? `${daysSelected} ${daysWord(daysSelected)} selected`
            : sd ? 'Select end date' : 'Select dates'}
        </span>
        <div className="dr-panel__foot-actions">
          <button type="button" className="dr-panel__reset" onClick={reset} disabled={isSamePeriodRange(range, defaultRange)}>Reset</button>
          <Button variant="primary" size="s" onClick={onClose} disabled={!sd || !ed}>Apply</Button>
        </div>
      </div>
    </div>
  );
};

const MONTH_KEY_TO_INDEX = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};

/* Parse contest's period string into a {start, end} Date pair.
   Supported shapes:
     "1 — 30 Apr 2026"            (same-month) → Apr 1 .. Apr 30
     "1 Mar — 30 Apr 2026"        (cross-month) → Mar 1 .. Apr 30
     "Not set" / null            → null (drafts) */
const parseContestPeriod = (period) => {
  if (!period || period === 'Not set') return null;
  const m1 = period.match(/^(\d+)\s+([A-Z][a-z]{2})\s*[—-]\s*(\d+)\s+([A-Z][a-z]{2})\s+(\d{4})$/);
  if (m1) {
    const y = +m1[5];
    const ms = MONTH_KEY_TO_INDEX[m1[2]];
    const me = MONTH_KEY_TO_INDEX[m1[4]];
    if (ms == null || me == null) return null;
    return { start: new Date(ms > me ? y - 1 : y, ms, +m1[1]), end: new Date(y, me, +m1[3]) };
  }
  const m2 = period.match(/^(\d+)\s*[—-]\s*(\d+)\s+([A-Z][a-z]{2})\s+(\d{4})$/);
  if (m2) {
    const y = +m2[4];
    const mi = MONTH_KEY_TO_INDEX[m2[3]];
    if (mi == null) return null;
    return { start: new Date(y, mi, +m2[1]), end: new Date(y, mi, +m2[2]) };
  }
  return null;
};

const sameCalendarDay = (a, b) => a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
const isSamePeriodRange = (a, b) => sameCalendarDay(a?.start, b?.start) && sameCalendarDay(a?.end, b?.end);

/* Минимальный start и максимальный end среди контестов с заданным period. */
const getContestTablePeriodBounds = (rows) => {
  let minStart = null, maxEnd = null;
  for (const r of rows) {
    const parsed = parseContestPeriod(r.period);
    if (!parsed) continue;
    const s = new Date(parsed.start); s.setHours(0, 0, 0, 0);
    const e = new Date(parsed.end); e.setHours(0, 0, 0, 0);
    if (!minStart || s < minStart) minStart = s;
    if (!maxEnd || e > maxEnd) maxEnd = e;
  }
  return minStart && maxEnd ? { start: minStart, end: maxEnd } : { start: null, end: null };
};

/* Range-overlap test: contest [cs..ce] vs filter [fs..fe].
   Любой край фильтра может быть null — тогда соответствующая граница не ограничивает.
   Черновики без дат всегда видны — IB не должен терять их из списка при фильтре периода. */
const matchesPeriodRange = (contestRange, fStart, fEnd) => {
  if (!fStart && !fEnd) return true;
  if (!contestRange) return true;
  if (fStart && contestRange.end < fStart) return false;
  if (fEnd && contestRange.start > fEnd) return false;
  return true;
};

/* Вторая строка под названием — метрики, которых нет в других колонках. */
const getContestRowMeta = (row) => {
  if (row.status === 'Active') {
    const parts = [];
    const activated = (row.activationReturned || 0) + (row.activationNew || 0);
    if (activated) parts.push(`${activated} trading`);
    if (row.ibProfit) parts.push(`${formatUsdCompact(row.ibProfit)} IB`);
    return parts.join(' · ') || null;
  }
  if (row.status === 'Draft') {
    if (row.period === 'Not set') return 'Set contest period';
    const parsed = parseContestPeriod(row.period);
    if (!parsed) return 'Not published';
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const start = new Date(parsed.start);
    start.setHours(0, 0, 0, 0);
    const days = Math.ceil((start - today) / 86400000);
    if (days > 0) {
      const dayLabel = days === 1 ? 'day' : 'days';
      return `Starts in ${days} ${dayLabel} · not published`;
    }
    if (row.prizePool) return `Prize ${formatUsdCompact(row.prizePool)} · not published`;
    return 'Not published';
  }
  if (row.status === 'Completed') {
    const parts = [];
    if (row.ibProfit) parts.push(`${formatUsdCompact(row.ibProfit)} IB`);
    const paid = row.prizesGifted ?? row.prizePool;
    if (paid) parts.push(`${formatUsdCompact(paid)} paid out`);
    return parts.join(' · ') || null;
  }
  return null;
};

const getContestCountSortValue = (row) => typeof row.count === 'number' ? row.count : null;

const getContestPeriodSortValue = (row) => {
  const parsed = parseContestPeriod(row.period);
  return parsed ? parsed.start.getTime() : null;
};

const sortContestRows = (rows, sort) => {
  if (!sort?.key) return rows;
  const dir = sort.dir === 'desc' ? -1 : 1;
  const getValue = sort.key === 'count' ? getContestCountSortValue : getContestPeriodSortValue;
  return [...rows].sort((a, b) => {
    const va = getValue(a);
    const vb = getValue(b);
    if (va == null && vb == null) return a.name.localeCompare(b.name, 'en');
    if (va == null) return 1;
    if (vb == null) return -1;
    if (va === vb) return a.name.localeCompare(b.name, 'en');
    return va < vb ? -dir : dir;
  });
};

const SORT_ICON_PATHS = {
  up: 'M480-120 300-300l58-58 122 122 122-122 58 58-180 180',
  down: 'M358-598l-58-58 180-180 180 180-58 58-122-122-122 122Z',
};

const SortableTh = ({ label, sortKey, sort, onSort, count }) => {
  const active = sort.key === sortKey;
  const btnCls = [
    'th-sort',
    active && sort.dir === 'asc' ? 'th-sort--asc' : '',
    active && sort.dir === 'desc' ? 'th-sort--desc' : '',
    !active ? 'th-sort--idle' : '',
  ].filter(Boolean).join(' ');
  const upActive = active && sort.dir === 'asc';
  const downActive = active && sort.dir === 'desc';
  return (
    <th aria-sort={active ? (sort.dir === 'asc' ? 'ascending' : 'descending') : 'none'}>
      <button type="button" className={btnCls} onClick={() => onSort(sortKey)}>
        <span className="th-label">
          {label}
          {count != null && <span className="th-label__count">{count}</span>}
        </span>
        <span className="th-sort__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <g transform="scale(0.025) translate(0, 960)">
              <path className={`th-sort__part${upActive ? ' th-sort__part--active' : ''}`} d={SORT_ICON_PATHS.up} />
              <path className={`th-sort__part${downActive ? ' th-sort__part--active' : ''}`} d={SORT_ICON_PATHS.down} />
            </g>
          </svg>
        </span>
      </button>
    </th>
  );
};

const IBCreateContest = ({ onNavigate, onCreateContest }) => {

  const [contestType, setContestType] = useState('volume');
  const [startDate, setStartDate] = useState(WIZARD_DEFAULT_START_DATE);
  const [endDate, setEndDate] = useState(WIZARD_DEFAULT_END_DATE);
  const [startTime, setStartTime] = useState('12:00');
  const [endTime, setEndTime] = useState('11:59');
  const [startMeridiem, setStartMeridiem] = useState('AM');
  const [endMeridiem, setEndMeridiem] = useState('PM');
  const [timezone, setTimezone] = useState('UTC+00');

  const FIXED_CONDITIONS = {
    minBalance: 100,
    minLot: 0.01,
    accountScope: 'single',
  };
  const [prizeType, setPrizeType] = useState('wallet');

  const [prizes, setPrizes] = useState([
    {id: 1, pos: 1, amount: '500'},
    {id: 2, pos: 2, amount: '300'},
    {id: 3, pos: 3, amount: '100'},
  ]);

  const addPrize = () => {
    setPrizes(prev => {
      const nextPos = prev.length + 1;
      const nextId = (prev[prev.length - 1]?.id || 0) + 1;
      return [...prev, {id: nextId, pos: nextPos, amount: '50'}];
    });
  };
  const removePrize = (id) => {
    setPrizes(prev => prev.filter(p => p.id !== id).map((p, i) => ({...p, pos: i + 1})));
  };
  const updatePrize = (id, amount) => {
    setPrizes(prev => prev.map(p => p.id === id ? {...p, amount} : p));
  };
  const prizeTotal = prizes.reduce((sum, p) => sum + (parseFloat(p.amount) || 0), 0);
  const previewTotalDays = Math.max(1, Math.round((endDate - startDate) / 86400000));
  const previewElapsedDays = Math.min(10, previewTotalDays);
  const previewProgress = Math.round((previewElapsedDays / previewTotalDays) * 100);

  const activeType = CONTEST_TYPES[contestType];

  const next = () => step < 4 && setStep(step + 1);
  const prev = () => step > 1 && setStep(step - 1);

  const fmtShort = d => `${d.getDate()} ${MONTHS_SHORT[d.getMonth()]} ${d.getFullYear()}`;
  const periodString = `${fmtShort(startDate)} — ${fmtShort(endDate)}`;

  const MONTHS_EN_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const formatPeriodEn = (s, e) => {
    const sd=s.getDate(), ed=e.getDate(), sm=s.getMonth(), em=e.getMonth(), sy=s.getFullYear(), ey=e.getFullYear();
    if (sy===ey && sm===em) return `${sd} — ${ed} ${MONTHS_EN_SHORT[sm]} ${sy}`;
    if (sy===ey) return `${sd} ${MONTHS_EN_SHORT[sm]} — ${ed} ${MONTHS_EN_SHORT[em]} ${sy}`;
    return `${sd} ${MONTHS_EN_SHORT[sm]} ${sy} — ${ed} ${MONTHS_EN_SHORT[em]} ${ey}`;
  };

  const buildContest = (status) => {
    const isActive = status === 'Active';
    const generatedName = activeType.title;
    return {
      name: generatedName,
      typeId: contestType,
      status,
      statusTag: isActive ? 'positive' : 'neutral',
      count: isActive ? 0 : '—',
      period: isActive ? formatPeriodEn(startDate, endDate) : 'Not set',
      progress: isActive ? 0 : null,
      action: isActive ? 'Statistics' : 'Edit',
      actionIcon: isActive ? 'chart' : 'edit',
      share: isActive,
      nav: isActive ? 'detail' : 'wizard',
    };
  };

  const saveDraft = () => {
    onCreateContest && onCreateContest(buildContest('Draft'));
    onNavigate('list');
    showToast('Draft saved');
  };
  const previewCardFooter = (
    <div className="ds-btn ds-btn--m ds-btn--primary ds-btn--block" aria-hidden="true">Join</div>
  );

  const launchContest = () => {
    onCreateContest && onCreateContest(buildContest('Active'));
    onNavigate('list');
    showToast('Contest launched!', 'positive');
  };

  return (
    <div className="screen-enter">
      <div className="wizard-layout">
        <div className="wizard-panel">
          <Breadcrumb items={[{label: 'Client contests', onClick: () => onNavigate('list')}, {label: 'Create contest'}]} />
          <div className="is-desktop-only">
          <WizardStepper currentStep={step} totalSteps={4} />

          <WizardStepperMobile currentStep={step} totalSteps={4} />

          {step === 1 && (
            <div>
              <h3 className="rig-title-03" style={{marginBottom:'var(--ds-dim-s)'}}>Contest type</h3>
              <p className="rig-body-02" style={{color:'var(--ds-text-muted)', marginBottom:'var(--ds-dim-4xl)'}}>Choose a competition format</p>
              <div className="rig-radio-cards" role="radiogroup" aria-label="Contest type">
                {CONTEST_TYPE_LIST.map(t => {
                  const isSelected = contestType === t.id;
                  const onKeyDown = (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                      e.preventDefault();
                      setContestType(t.id);
                    } else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                      e.preventDefault();
                      const i = CONTEST_TYPE_LIST.findIndex(x => x.id === contestType);
                      setContestType(CONTEST_TYPE_LIST[(i + 1) % CONTEST_TYPE_LIST.length].id);
                    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                      e.preventDefault();
                      const i = CONTEST_TYPE_LIST.findIndex(x => x.id === contestType);
                      setContestType(CONTEST_TYPE_LIST[(i - 1 + CONTEST_TYPE_LIST.length) % CONTEST_TYPE_LIST.length].id);
                    }
                  };
                  return (
                    <div
                      key={t.id}
                      role="radio"
                      aria-checked={isSelected}
                      tabIndex={isSelected ? 0 : -1}
                      className={`rig-radio-card ${isSelected ? 'rig-radio-card--selected' : ''}`}
                      onClick={() => setContestType(t.id)}
                      onKeyDown={onKeyDown}

                      <div className={`icon-circle icon-circle--${t.circle}`} style={{flexShrink:0}}>
                        <svg width="20" height="20"><use href={dsIc(t.icon)}/></svg>

                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:'flex',alignItems:'center',gap:'var(--ds-dim-m)'}}>

                        <div className="rig-utility-01" style={{color:'var(--ds-text-muted)',marginTop:'var(--ds-dim-xs)'}}>{t.desc}</div>
                      </div>
                      <span className="rig-radio-card__trail" aria-hidden="true">
                        {isSelected && <svg><use href="#ic-check-24"/></svg>}
                      </span>
                    </div>
                  );
                })}

              <WizardFooterMobile step={step} onPrev={prev} onNext={next} onSaveDraft={saveDraft} />

          {step === 2 && (

              <h3 className="rig-title-03" style={{marginBottom:'var(--ds-dim-s)'}}>Contest period</h3>

          {step === 3 && (

                    <Chips
                      label="T&W prizes"

              </div>
              <div className="prize-rows-list">
                {prizes.map(p => (
                  <div key={p.id} className="prize-row prize-row-grid">
                    <PrizeRank position={p.pos} />
                    <div className="rig-body-01-bold prize-row__label">{p.pos} place</div>
                    <Input prefix="$" value={p.amount} onChange={e => updatePrize(p.id, e.target.value)} placeholder="0" />

                      <IconButton icon="trash" size="s" className="ds-icon-btn--text" onClick={() => removePrize(p.id)} title="Remove place" />

              </div>
              <WizardFooter step={step} onPrev={prev} onNext={next} onSaveDraft={saveDraft} />
              <WizardFooterMobile step={step} onPrev={prev} onNext={next} onSaveDraft={saveDraft} />

              {(() => {

                      <button

                          {k:'Description', v: activeType.clientDescTemplate(prizes[0]?.amount ? parseFloat(prizes[0].amount).toLocaleString('en-US') : '0'), span: 2},
                        ].map(renderField)}
                      </div>
                      {divider}
                      <div className="wizard-review-grid">
                        {[
                          {k:'Period', v: periodString, editStep: 2},
                          {k:'Time', v: `${startTime} ${startMeridiem} — ${endTime} ${endMeridiem}, ${timezone}`, editStep: 2},
                          {k:'Metric', v: activeType.metric},
                          {k:'Min. client balance', v: `$${FIXED_CONDITIONS.minBalance}`},

                            </>

                          {k:'Trading accounts', v:'Only 1 client account'},

                      </div>
                      {divider}
                      <div className="wizard-review-grid">
                        {[
                          {k:'Prize pool', v: `$${prizeTotal.toLocaleString('en-US')}`, editStep: 3},

              })()}
              <WizardFooter step={step} isFinal onPrev={prev} onSaveDraft={saveDraft} onLaunch={launchContest} />

          {/* Mobile-only: open preview as a bottom-sheet modal. Hidden on desktop because the sidebar is already visible. */}

        {/* Desktop-only sticky preview sidebar */}

      {/* Mobile-only: same preview rendered inside a bottom-sheet modal */}
      <Modal
        open={previewOpen}

              <ContestCard

};

          <Button variant="outline" size="s" icon="link" onClick={onInvite}>

  return (
    <StatBannersLayout ariaLabel="Contest metrics">
      <StatBanner
        variant="reach"
        icon="users"
        label="Participants"
        value={String(totalParticipants)}

      <StatBanner
        variant="engage"
        icon="chart"

        value={isFresh ? '0' : '1,234'}

      />

        variant="prize"
        icon="trophy"
        label="Prize pool"

        infoTip="Total prize amount distributed across places in this contest."
      />
      <StatBanner
        variant="profit"
        icon="trending-up"
        label="Period trend"
        value={isFresh ? '—' : '+23%'}

const IBContestDetail = ({ onNavigate, contest }) => {
  const showToast = useToast();
  const isMobile = useIsMobile();
  // Resolve which contest is being viewed. Falls back to the canonical
  // populated Volume Race mock so the page is never empty when reached
  // outside the IB list (e.g. via Admin or direct nav).
  const ctype = CONTEST_TYPES[contest?.typeId] || CONTEST_TYPES.volume;
  const name = contest?.name || 'Volume Race';
  const period = contest?.period || '1 — 30 Apr 2026';
  const statusLabel = contest?.status || 'Active';
  const statusTag = contest?.statusTag || 'positive';
  const participantCount = contest
    ? (typeof contest.count === 'number' ? contest.count : 0)
    : 47;
  // "Just created" / fresh state — contest exists but has no participants
  // (or no period yet, e.g. a draft was opened from the list).
  const isFresh = !!contest && (
    participantCount === 0 ||
    contest.count === '—' ||
    contest.status === 'Draft' ||
    contest.status === 'Pending'
  );
  const totalParticipants = isFresh ? 0 : participantCount;
  const isCompleted = contest?.status === 'Completed';
  const isActive = contest?.status === 'Active';
  const prizePool = contest?.prizePool ?? 900;
  const periodWithTime = period && period !== 'Not set' ? `${period}, 23:59 UTC` : period;
  const leaderboardMetaText = isCompleted
    ? `Updated: ${(period.includes(' — ') ? period.split(' — ')[1] : period).trim()}, 23:59 UTC`
    : 'Updated: May 4, 2026, 14:32 UTC';
  const prizes = ['$500', '$300', '$100'];
  const initialsAt = (i) => {
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    return `Client_${letters[i % 26]}${letters[(i * 7 + 3) % 26]}****`;
  };
  const valueAt = (p) => (260 * Math.pow(0.94, p - 1)).toFixed(1);
  const rows = Array.from({length: totalParticipants}).map((_, i) => {
    const p = i + 1;
    return {
      pos: p,
      name: initialsAt(i),
      vol: valueAt(p),
      prize: p <= 3 ? prizes[p - 1] : null,
    };
  });
  return (
    <div className="screen-enter">
      <Breadcrumb items={[{label:'Client contests', onClick:() => onNavigate('list')}, {label:'Contest details'}]} />
      <div className="page-header contest-detail-header" style={{marginTop:'var(--ds-dim-6xl)', marginBottom:'var(--ds-dim-s)'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
          <span className={`type-icon type-icon--${ctype.typeIcon}`} style={{width:24,height:24,flexShrink:0}}>
            <svg width="14" height="14"><use href={dsIc(ctype.icon)}/></svg>
          </span>
          <h1 className="rig-title-02">{name}</h1>
          <ContestTypeInfo typeId={ctype.id} period={periodWithTime} />
        </div>
      </div>
      <div className="contest-detail-meta">
        <Tag label={statusLabel} variant={statusTag} />
        <ContestPeriodMeta>{periodWithTime}</ContestPeriodMeta>
        {!isFresh && !isCompleted && (
          <span className="contest-period-meta">
            <Icon name="clock" size="sm" />
            <span>20 days left</span>
          </span>
        )}
      </div>
      <p className="rig-body-02 contest-detail-desc" style={{color:'var(--ds-text-secondary)', marginBottom:'var(--ds-dim-5xl)'}}>
        {ctype.clientDescTemplate ? ctype.clientDescTemplate(500) : ctype.desc}
      </p>
      <div className="contest-detail-actions contest-detail-action-bar">
        <Button variant="outline" size="s" icon="link" onClick={() => showToast('Link copied!', 'positive')}>Share</Button>
        {!isCompleted && (
          <Button variant="outline" size="s" icon="pause" onClick={() => showToast('Contest paused', 'negative', { label:'Undo', onClick:() => showToast('Contest resumed', 'positive') })}>Pause</Button>
        )}
        <Button variant="outline" size="s" icon="download" disabled={isFresh}>Export</Button>
      </div>
      <div style={{marginBottom:24}}>
        <IBContestDetailStatsBanners
          totalParticipants={totalParticipants}
          metricLabel={ctype.metric}
          prizePool={prizePool}
          isFresh={isFresh}
          isCompleted={isCompleted}
          isActive={isActive}
          onInvite={() => showToast('Link copied!', 'positive')}
        />
      </div>
      {isFresh ? (
        <div className="table-wrap table-wrap--leaderboard">
          <div className="empty-state">
            <div style={{width:120,height:120,marginBottom:'var(--ds-dim-3xl)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <IllNoParticipants />
            </div>
            <h4 className="rig-title-03" style={{marginBottom:'var(--ds-dim-2xl)'}}>No participants yet</h4>
            <p className="rig-body-02" style={{color:'var(--ds-text-secondary)', maxWidth:'52ch', marginBottom:'var(--ds-dim-5xl)'}}>
              Participants will appear here once clients join the contest. Share the link to get started faster.
            </p>
            <Button variant="primary" size="m" icon="link" onClick={() => showToast('Link copied!', 'positive')}>Copy link</Button>
          </div>
        </div>
      ) : (
        <>
          <div className="table-header leaderboard-table-header">
            <h4 className="rig-title-04">
              Leaderboard
              <span className="rig-utility-01 leaderboard-table-header__count">{totalParticipants} participants</span>
            </h4>
            <span className="table-header__meta">{leaderboardMetaText}</span>
          </div>
          {isMobile ? (
            <div className="lb-card-list">
              {rows.slice(0, 20).map(r => {
                const topClass = r.pos === 1 ? 'lb-card--top1' : r.pos === 2 ? 'lb-card--top2' : r.pos === 3 ? 'lb-card--top3' : '';
                return (
                  <div key={r.pos} className={`lb-card ${topClass}`}>
                    <Medal position={r.pos}/>
                    <div style={{minWidth:0}}>
                      <div className="lb-card__name">{r.pos <= 3 ? <strong>{r.name}</strong> : r.name}</div>
                      <div className="lb-card__sub">{r.vol} {ctype.metric.toLowerCase()}</div>
                    </div>
                    <div className={`lb-card__prize ${!r.prize ? 'lb-card__prize--empty' : ''}`}>{r.prize || '—'}</div>
                  </div>
                );
              })}
              {rows.length > 20 && (
                <div style={{marginTop:'var(--ds-dim-2xl)'}}>
                  <Button variant="text" size="l" block>Load more</Button>
                </div>
              )}
            </div>
          ) : (
          <div className="table-wrap table-wrap--leaderboard">
            <div className="leaderboard-scroll">
              <table>
                <thead><tr>
                  <th className="lb-col-place">Place</th>
                  <th className="lb-col-name">Participant</th>
                  <th className="lb-col-score">{ctype.metric}</th>
                  <th className="lb-col-prize">Prize</th>
                </tr></thead>
                <tbody>
                  {rows.map(r => (
                    <tr key={r.pos}>
                      <td className="lb-col-place"><Medal position={r.pos} /></td>
                      <td className="lb-col-name">{r.pos <= 3 ? <strong>{r.name}</strong> : r.name}</td>
                      <td className="lb-col-score">{r.vol}</td>
                      <td className="lb-col-prize" style={{color: r.prize ? undefined : 'var(--ds-text-muted)'}}>{r.prize || '—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
          )}
        </>
      )}
    </div>
  );
};

const ClientContestList = ({ onNavigate, onSelectContest, joinedContests = {}, onCancelContest, onJoinContest, seenContestTypes, onMarkContestSeen }) => {
  const showToast = useToast();
  const isMobile = useIsMobile();
  const cards = CLIENT_CONTESTS;
  const seen = seenContestTypes || new Set();
  const markIfNew = (typeId) => {
    const row = CLIENT_CONTESTS.find(x => x.typeId === typeId);
    if (row?.isNew && onMarkContestSeen) onMarkContestSeen(typeId);
  };
  const openTerms = (typeId) => {
    markIfNew(typeId);
    onSelectContest && onSelectContest(typeId);
    onNavigate('terms');
  };
  const openBoard = (typeId) => {
    markIfNew(typeId);
    onSelectContest && onSelectContest(typeId);
    onNavigate('board');
  };
  const cancel = (typeId, mode) => {
    markIfNew(typeId);
    onCancelContest && onCancelContest(typeId);
    showToast('Registration cancelled', 'negative', {
      label: 'Undo',
      onClick: () => onJoinContest && onJoinContest(typeId, mode),
    });
  };

  const completed = CLIENT_COMPLETED_CONTESTS;
  const openCompleted = (name) => { onSelectContest && onSelectContest(`completed:${name}`); onNavigate('board'); };
  // Deterministic winner alias per contest — gives the empty action cell a
  // useful piece of competitive context until the row's hover button appears.
  const winnerOf = (name) => {
    const sum = [...String(name)].reduce((a, c) => a + c.charCodeAt(0), 0);
    const A = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    return `${A[sum % 26]}${A[(sum * 7 + 3) % 26]}****`;
  };

  const completedTotal = completed.length;
  const prizePlacesCount = completed.filter(c => c.yourPlace >= 1 && c.yourPlace <= 3).length;
  const contestsGenitiveAfterIz = (n) => {
    const mod10 = n % 10, mod100 = n % 100;
    return n === 1 ? 'contest' : 'contests';
  };

  const activeTotal = cards.length;
  const participatingCount = cards.filter(c => !!joinedContests[c.typeId]).length;

  return (
  <div className="screen-enter">
    <div className="page-header">
      <h1 className="rig-title-03">Partner contests</h1>
    </div>
    <div className="table-header">
      <h4 className="rig-title-04">Active</h4>
      <span className="table-header__meta">
        Participating in {participatingCount} of {activeTotal} {contestsGenitiveAfterIz(activeTotal)}
      </span>
    </div>
    <div className="contest-grid">
      {cards.map(c => {
        const joinState = joinedContests[c.typeId];
        const joined = !!joinState;
        const isUpcoming = c.state === 'upcoming';
        let footer;
        if (!joined) {
          footer = (
            <Button variant="primary" size="m" block onClick={() => openTerms(c.typeId)}>
              Join
            </Button>
          );
        } else if (isUpcoming || joinState === 'upcoming') {
          footer = (
            <Button variant="outline" size="m" block onClick={() => cancel(c.typeId, joinState || 'upcoming')}>Cancel registration</Button>
          );
        } else {
          footer = (
            <Button variant="outline" size="m" icon="chart" block onClick={() => openBoard(c.typeId)}>Statistics</Button>
          );
        }
        return (
          <ContestCard
            key={c.name}
            typeId={c.typeId}
            name={c.name}
            statusLabel={c.statusLabel}
            statusVariant={c.statusVariant}
            desc={c.desc}
            dates={c.dates}
            participants={c.participants}
            prize={c.prize}
            days={c.days}
            progress={c.progress}
            progressText={c.progressText}
            showNewBadge={!!c.isNew && !seen.has(c.typeId)}
            onClick={() => (joined && !isUpcoming && joinState !== 'upcoming') ? openBoard(c.typeId) : openTerms(c.typeId)}
            footer={footer}
          />
        );
      })}
    </div>

    <div className="table-header" style={{marginTop:'var(--ds-dim-7xl)'}}>
      <h4 className="rig-title-04">Completed</h4>
      <span className="table-header__meta">
        Placed in the prizes in {prizePlacesCount} of {completedTotal} {contestsGenitiveAfterIz(completedTotal)}
      </span>
    </div>
    {isMobile ? (
      <div className="row-card-list">
        {completed.map(c => {
          const t = CONTEST_TYPES[c.typeId];
          return (
            <div key={c.name} className="row-card" onClick={() => openCompleted(c.name)} role="button" tabIndex={0}>
              <div className="row-card__head">
                <div style={{display:'flex',alignItems:'center',gap:'var(--ds-dim-2xl)',flex:'1 1 auto',minWidth:0}}>
                  <span className={`icon-circle icon-circle--${t.circle}`} style={{width:32,height:32,flexShrink:0}}>
                    <svg width="16" height="16"><use href={dsIc(t.icon)}/></svg>
                  </span>
                  <div className="row-card__title-block">
                    <div className="row-card__title">{c.name}</div>
                    <div className="row-card__sub">{t.title} · {c.dates}</div>
                  </div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div className="rig-body-02-bold" style={{fontVariantNumeric:'tabular-nums'}}>#{c.yourPlace}</div>
                  <div className="rig-utility-01" style={{color: c.yourReward ? 'var(--ds-positive)' : 'var(--ds-text-muted)', marginTop: 2}}>
                    {c.yourReward ? c.yourReward.replace(/\s*bonus$/i, '') : 'no prize'}
                  </div>
                </div>
              </div>
              <div className="row-card__meta">
                <span className="row-card__meta-item"><svg><use href="#ic-users-24"/></svg>{c.participants} participants</span>
                <span className="row-card__meta-item"><svg><use href="#ic-cup-24"/></svg>Winner: <strong style={{color:'var(--ds-text-primary)',fontWeight:600,marginLeft:4}}>{winnerOf(c.name)}</strong></span>
              </div>
              <div className="row-card__actions" onClick={e => e.stopPropagation()}>
                <Button variant="outline" size="m" icon="eye" onClick={() => openCompleted(c.name)}>Results</Button>
              </div>
            </div>
          );
        })}
      </div>
    ) : (
    <div className="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Contest</th>
            <th>Period</th>
            <th>Participants</th>
            <th>Your place</th>
            <th>Reward</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {completed.map(c => {
            const t = CONTEST_TYPES[c.typeId];
            return (
              <tr key={c.name} style={{cursor:'pointer'}} onClick={() => openCompleted(c.name)}>
                <td>
                  <div style={{display:'flex',alignItems:'center',gap:'var(--ds-dim-2xl)'}}>
                    <span className={`icon-circle icon-circle--${t.circle}`} style={{width:32,height:32,flexShrink:0}}>
                      <svg width="16" height="16"><use href={dsIc(t.icon)}/></svg>
                    </span>
                    <div>
                      <div className="rig-body-02-bold">{c.name}</div>
                      <div className="rig-utility-01" style={{color:'var(--ds-text-muted)',marginTop:'var(--ds-dim-xs)'}}>{t.title}</div>
                    </div>
                  </div>
                </td>
                <td>{c.dates}</td>
                <td>{c.participants}</td>
                <td><strong>#{c.yourPlace}</strong></td>
                <td>{c.yourReward ? <span style={{fontVariantNumeric:'tabular-nums'}}>{c.yourReward.replace(/\s*bonus$/i, '')}</span> : <span style={{color:'var(--ds-text-muted)'}}>—</span>}</td>
                <td style={{textAlign:'right'}}>
                  <div className="row-action-stack">
                    <span className="row-meta" aria-hidden="true">
                      <Icon name="trophy" size="xs" /> Winner: <strong>{winnerOf(c.name)}</strong>
                    </span>
                    <span className="td-actions">
                      <Button className="row-hover-action" variant="outline" size="s" icon="eye" onClick={e => { e.stopPropagation(); openCompleted(c.name); }}>Results</Button>
                    </span>
                  </div>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
    )}
  </div>
  );
};

const MIN_BALANCE_USD = 100;

const contestRequiresFunding = (typeId) => typeId === 'grow';

const INITIAL_TRADING_ACCOUNTS = [
  { id: 'mt5-5123467', type: 'MT5', number: '5123467', label: 'Primary',  leverage: '1:500',  balance: 1540, currency: 'USD' },
  { id: 'mt5-5123482', type: 'MT5', number: '5123482', label: 'Swing',    leverage: '1:200',  balance: 45,   currency: 'USD' },
  { id: 'mt4-4298110', type: 'MT4', number: '4298110', label: 'Scalping', leverage: '1:1000', balance: 250,  currency: 'USD' },
];

const JoinContestModal = ({ open, onClose, onJoin, contestName, contestType = 'volume', preregister = false, startsAtLabel }) => {
  const requiresFunding = contestRequiresFunding(contestType);
  const [accounts, setAccounts] = useState(INITIAL_TRADING_ACCOUNTS);
  const [selectedId, setSelectedId] = useState(null);
  const [createSelected, setCreateSelected] = useState(false);

  useEffect(() => {
    if (open) {
      setAccounts(INITIAL_TRADING_ACCOUNTS);
      setSelectedId(null);
      setCreateSelected(false);
    }
  }, [open]);

  const selected = accounts.find(a => a.id === selectedId) || null;
  const deficit = selected ? Math.max(0, MIN_BALANCE_USD - selected.balance) : 0;
  const needsDeposit = !preregister && requiresFunding && !!selected && selected.balance < MIN_BALANCE_USD;
  const canJoin = requiresFunding ? (!!selected || createSelected) : true;

  const pickAccount = (id) => { setSelectedId(id); setCreateSelected(false); };
  const pickCreate = () => { setCreateSelected(true); setSelectedId(null); };

  const handleParticipate = () => {
    if (createSelected) {
      const num = String(5300000 + Math.floor(Math.random() * 999999));
      const startingBalance = (requiresFunding && !preregister) ? MIN_BALANCE_USD : 0;
      const newAcc = { id: `new-${num}`, type: 'MT5', number: num, label: 'New', leverage: '1:500', balance: startingBalance, currency: 'USD' };
      setAccounts([newAcc, ...accounts]);
      setSelectedId(newAcc.id);
      onJoin(newAcc);
      return;
    }
    if (preregister) { onJoin(selected); return; }
    if (!requiresFunding) { onJoin(selected); return; }
    if (!selected) return;
    if (selected.balance < MIN_BALANCE_USD) {
      const topped = { ...selected, balance: MIN_BALANCE_USD };
      setAccounts(accounts.map(a => a.id === selected.id ? topped : a));
      onJoin(topped);
      return;
    }
    onJoin(selected);
  };

  const participateLabel = preregister
    ? (createSelected ? 'Create account and register' : 'Register for contest')
    : (createSelected
        ? 'Create trading account and join'
        : (needsDeposit ? `Deposit $${deficit} and join` : 'Join'));

  return (
    <Modal
      open={open}
      onClose={onClose}
      title={preregister ? 'Pre-registration' : 'Join contest'}
      subtitle={contestName}
      size="l"
      footer={<>
        <Button variant="outline" size="m" onClick={onClose}>Cancel</Button>
        <Button variant="primary" size="m" disabled={!canJoin} onClick={handleParticipate}>
          {participateLabel}
        </Button>
      </>}
    >
      {preregister && (
        <div className="info-box" style={{marginBottom:'var(--ds-dim-3xl)'}}>
          <Icon name="clock" size="sm" style={{color:'var(--ds-primary)', marginTop:1}} />
          <span>
            The contest has not started yet{startsAtLabel ? <> — starts <strong>{startsAtLabel}</strong></> : ''}.
            We will automatically enroll you when it starts.
          </span>
        </div>
      )}

      <div className="join-rules">
        <div className="join-rules__title">Participation requirements</div>
        <div className="join-rules__grid">
          {requiresFunding && (
            <div>
              <div className="join-rules__label">Minimum balance</div>
              <div className="join-rules__value">${MIN_BALANCE_USD}</div>
            </div>
          )}
          <div>
            <div className="join-rules__label">
              Min. trade volume
              <InfoTip placement="bottom">
                Only trades that meet the valid lot rule count.
                <br /><br />
                <strong>Valid lot</strong> — trade held for at least 3 minutes and moved at least 3 pips.
              </InfoTip>
            </div>
            <div className="join-rules__value">0.01 lots</div>
          </div>
          {requiresFunding && (
            <div>
              <div className="join-rules__label">Trading account</div>
              <div className="join-rules__value">1</div>
            </div>
          )}
        </div>
      </div>

      {requiresFunding && (
      <div className="section-title" style={{marginTop:'var(--ds-dim-4xl)', marginBottom:'var(--ds-dim-2xl)'}}>
        Select trading account
      </div>
      )}

      {requiresFunding && (
      <div className="rig-radio-cards">
        {accounts.map(a => {
          const low = !preregister && a.balance < MIN_BALANCE_USD;
          return (
            <div
              key={a.id}
              className={`rig-radio-card ${selectedId === a.id ? 'rig-radio-card--selected' : ''}`}
              onClick={() => pickAccount(a.id)}
            >
              <div className="icon-circle icon-circle--primary" style={{flexShrink:0}}>
                <svg width="20" height="20"><use href="#ic-market-watch-24"/></svg>
              </div>
              <div style={{flex:1, minWidth:0}}>
                <div className="rig-body-02-bold">{a.type} #{a.number}</div>
                <div className="rig-utility-01" style={{color:'var(--ds-text-muted)', marginTop:'var(--ds-dim-xs)'}}>
                  Balance: <strong style={{color: low ? 'var(--ds-warning)' : 'var(--ds-text-primary)', fontVariantNumeric:'tabular-nums'}}>${a.balance.toLocaleString('en-US')}</strong> · {a.label}{a.leverage ? ` · Leverage ${a.leverage}` : ''}
                </div>
              </div>
              {low && (
                <Tag label="Insufficient funds" variant="warning" icon="alert-triangle" />
              )}
            </div>
          );
        })}

        <button type="button" className={`join-create ${createSelected ? 'join-create--selected' : ''}`} onClick={pickCreate}>
          <span className="join-create__icon"><svg><use href="#ic-plus-24"/></svg></span>
          <span style={{flex:1, minWidth:0}}>
            <span className="rig-body-02-bold">{preregister ? 'Create account and register' : 'Create account and join'}</span>
            <span className="rig-utility-01" style={{display:'block', color:'var(--ds-text-muted)', marginTop:'var(--ds-dim-xs)'}}>
              {preregister
                ? 'MT5 · created instantly'
                : `MT5 · created instantly, balance $${MIN_BALANCE_USD}`}
            </span>
          </span>
        </button>
      </div>
      )}

      {!requiresFunding && (
        <div className="info-box info-box--positive" style={{marginTop:'var(--ds-dim-3xl)'}}>
          <Icon name="check" size="sm" style={{color:'var(--ds-positive)', marginTop:1}} />
          <span>
            No extra account needed — participation applies automatically across all your trading accounts.
          </span>
        </div>
      )}
    </Modal>
  );
};

const ClientContestTerms = ({ onNavigate, contestTypeId = 'volume', joinedContests = {}, onJoinContest, onCancelContest, onMarkContestSeen }) => {
  const showToast = useToast();
  const isMobile = useIsMobile();
  const [joinOpen, setJoinOpen] = useState(false);
  const contest = CLIENT_CONTESTS.find(c => c.typeId === contestTypeId) || CLIENT_CONTESTS[0];
  const requiresFunding = contestRequiresFunding(contest.typeId);
  const isUpcoming = contest.state === 'upcoming';
  const joinedState = joinedContests[contest.typeId];
  const alreadyJoined = !!joinedState;
  const joinedUpcoming = alreadyJoined && (isUpcoming || joinedState === 'upcoming');
  const ctaLabel = alreadyJoined
    ? (joinedUpcoming ? 'Cancel registration' : 'Open leaderboard')
    : (isUpcoming ? 'Register for contest' : 'Join');
  const ctaCaption = joinedUpcoming
    ? `You are registered. The contest starts ${contest.startsAtLabel || contest.dates}.`
    : (alreadyJoined
        ? 'You are already participating — see your rank and stats on the leaderboard.'
        : (isUpcoming
            ? 'By clicking “Register for contest”, you agree to the contest rules and participation terms.'
            : 'By clicking “Join”, you agree to the contest rules and participation terms.'));
  const handleCancel = () => {
    const prev = joinedState;
    onCancelContest && onCancelContest(contest.typeId);
    showToast('Registration cancelled', 'negative', {
      label: 'Undo',
      onClick: () => onJoinContest && onJoinContest(contest.typeId, prev),
    });
  };
  useEffect(() => {
    if (!onMarkContestSeen || !contest?.typeId) return;
    const meta = CLIENT_CONTESTS.find(c => c.typeId === contest.typeId);
    if (meta?.isNew) onMarkContestSeen(contest.typeId);
  }, [contest.typeId, onMarkContestSeen]);
  return (
    <div className="screen-enter">
      <Breadcrumb items={[{label:'Contests', onClick:() => onNavigate('list')}, {label:'Contest details'}]} />
      <div style={{textAlign:'center',marginBottom:'var(--ds-dim-6xl)'}}>
        <div style={{marginBottom:'var(--ds-dim-3xl)'}}><span className="icon-circle icon-circle--primary" style={{width:64,height:64}}><svg width="32" height="32"><use href="#ic-market-watch-24"/></svg></span></div>
        <div style={{display:'inline-flex',alignItems:'center',gap:'var(--ds-dim-2xl)',justifyContent:'center'}}>
          <h1 className="rig-title-02">{contest.name}</h1>
          <ContestTypeInfo typeId={contest.typeId} />
        </div>
        <p className="rig-body-01" style={{color:'var(--ds-text-muted)',marginTop:'var(--ds-dim-2xl)'}}>{contest.desc}</p>
      </div>

      <div style={{marginBottom:'var(--ds-dim-3xl)'}}>
        <div className="stats">
          <StatCard value={contest.days || '—'} label="Remaining" />
          <StatCard value={String(contest.participants)} label="Participants" />
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:'var(--ds-dim-3xl)',marginBottom:'var(--ds-dim-6xl)'}} className="terms-grid">
        <div className="card">
          <div className="card__header"><h4 className="rig-title-04"><Icon name="clipboard" size="sm" style={{marginRight:'var(--ds-dim-s)'}} /> Rules</h4></div>
          <div className="card__body">
            <BulletList items={[
              ...(requiresFunding ? [
                `Minimum client balance: $${MIN_BALANCE_USD}`,
                'Only 1 client trading account participates',
              ] : []),
              'Minimum trade volume: 0.01 lots (valid lot rule applies)',
              'Rank is determined by total volume in lots',
              `Period: ${contest.period || contest.dates}, 23:59 UTC`,
            ]} />
          </div>
        </div>
        <div className="card">
          <div className="card__header"><h4 className="rig-title-04"><Icon name="gift" size="sm" style={{marginRight:'var(--ds-dim-s)'}} /> Prizes</h4></div>
          <div className="card__body">
            <div style={{display:'flex',flexDirection:'column',gap:'var(--ds-dim-3xl)'}}>
              {(contest.prizes || []).map(p => (
                <div key={p.pos} style={{display:'flex',alignItems:'center',gap:'var(--ds-dim-2xl)'}}>
                  <PrizeRank position={p.pos} />
                  <span className="rig-body-02" style={{flex:1,color:'var(--ds-text-primary)'}}>{p.pos} place</span>
                  <span className="rig-body-02-bold" style={{color:'var(--ds-text-primary)',fontVariantNumeric:'tabular-nums'}}>
                    {String(p.prize).replace(/\s*bonus$/i, '')}
                  </span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {isMobile && <div className="client-terms-spacer" aria-hidden="true" />}
      <div className={`client-terms-cta ${isMobile ? '' : 'is-desktop-only'}`} style={isMobile ? undefined : {display:'flex', flexDirection:'column', alignItems:'center', gap:'var(--ds-dim-3xl)', marginTop:'var(--ds-dim-3xl)'}}>
        {joinedUpcoming ? (
          <Button variant="outline" size="l" icon="trash" onClick={handleCancel} style={{minWidth: 360, paddingLeft:'var(--ds-dim-6xl)', paddingRight:'var(--ds-dim-6xl)'}}>{ctaLabel}</Button>
        ) : alreadyJoined ? (
          <Button variant="primary" size="l" icon="trophy" onClick={() => onNavigate('board')} style={{minWidth: 360, paddingLeft:'var(--ds-dim-6xl)', paddingRight:'var(--ds-dim-6xl)'}}>{ctaLabel}</Button>
        ) : (
          <Button variant="primary" size="l" icon={isUpcoming ? 'clock' : undefined} onClick={() => setJoinOpen(true)} style={{minWidth: 360, paddingLeft:'var(--ds-dim-6xl)', paddingRight:'var(--ds-dim-6xl)'}}>{ctaLabel}</Button>
        )}
        <p className="rig-utility-01 client-terms-cta__caption" style={{color:'var(--ds-text-placeholder)',textAlign:'center'}}>{ctaCaption}</p>
      </div>

      <JoinContestModal
        open={joinOpen}
        onClose={() => setJoinOpen(false)}
        contestName={contest.name}
        contestType={contest.typeId}
        preregister={isUpcoming}
        startsAtLabel={contest.startsAtLabel}
        onJoin={(account) => {
          setJoinOpen(false);
          onJoinContest && onJoinContest(contest.typeId, isUpcoming ? 'upcoming' : 'active');
          if (isUpcoming) {
            showToast(
              `Registration confirmed. Participation starts ${contest.startsAtLabel || contest.dates}`,
              'positive'
