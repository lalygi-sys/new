name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site/prototype _site/artifacts
          cp -rL prototype/. _site/prototype/
          if [ -d artifacts/fonts ]; then
            cp -r artifacts/fonts _site/artifacts/fonts
          fi
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="ru">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>IB Contest Platform — React Prototype</title>
            <meta http-equiv="refresh" content="0; url=./prototype/index.html">
            <link rel="canonical" href="./prototype/index.html">
          </head>
          <body>
            <p><a href="./prototype/index.html">Открыть прототип</a></p>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
